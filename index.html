<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Rama Tracker v2.19 (Final)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .step-card { border-left: 4px solid #0d6efd; margin-bottom: 15px; transition: 0.3s; }
        .step-locked { opacity: 0.5; pointer-events: none; border-left: 4px solid #6c757d; background-color:#f1f3f5 !important; }
        .condition-wait { border-left: 4px solid #ffc107 !important; background-color: #fffbeb !important; }
        .tag-item { display: inline-block; background: #e9ecef; border: 1px solid #dee2e6; border-radius: 15px; padding: 2px 10px; margin: 2px; font-size: 0.85rem; }
        .tag-remove { margin-left: 5px; cursor: pointer; color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center mb-4 text-primary">ติดตามงานวิจัยิวหนัง รามาธิบดี 1.39</h3>

    <div id="login-section" class="card shadow-sm p-4">
        <div class="text-center mb-3">
            <span id="login-status" class="text-warning fw-bold">กำลังเชื่อมต่อระบบ LINE...</span>
        </div>
        <div class="mb-3">
            <label class="form-label">Rama ID</label>
            <input type="tel" id="login-ramaid" class="form-control" placeholder="ระบุ Rama ID" inputmode="numeric">
        </div>
        <button id="login-btn" class="btn btn-primary w-100" onclick="login()" disabled>เข้าสู่ระบบ</button>
    </div>

    <div id="app-section" style="display:none;">
        <div class="alert alert-info py-2 mb-3 shadow-sm d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span>👤 <span id="display-username" class="fw-bold text-primary"></span></span>
            <div class="text-end">
                <span id="role-badge" class="badge bg-secondary shadow-sm me-1" style="display:none; font-size: 0.8rem;">กำลังตรวจสอบสิทธิ์...</span>
                <button class="btn btn-sm btn-outline-primary bg-white me-1" onclick="fetchInitialData()">🔄 รีเฟรช</button>
                <button class="btn btn-sm btn-outline-danger bg-white" onclick="location.reload()">🚪 ออก</button>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">เลือกงานวิจัย</label>
            <select id="research-selector" class="form-select border-primary shadow-sm" onchange="loadResearch(this.value)">
                <option value="">-- กำลังโหลดข้อมูล... --</option>
            </select>
        </div>

        <form id="research-form" style="display:none;">
            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2 text-primary">ข้อมูลทั่วไป</h5>
                <div class="mb-2">
                    <label class="form-label">Title (ชื่อเรื่อง)</label>
                    <input type="text" id="Title" class="form-control" required>
                    <div id="mr_name_display" class="text-success small mt-1 fw-bold" style="display:none;"></div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold mt-2">ทีมวิจัย (Other Research - แพทย์)</label>
                    <div id="other_research_list" class="mb-2 p-2 border rounded bg-light min-vh-5" style="min-height: 45px;"></div>
                    <button type="button" id="btn_add_doctor" class="btn btn-outline-primary btn-sm" onclick="openPicker('doctor')">+ เพิ่มรายชื่อแพทย์</button>
                </div>

                <div class="mb-3">
                    <label class="form-label">Main Staff (อาจารย์ที่ปรึกษาหลัก)</label>
                    <select id="ramaID_MS" class="form-select" required onchange="currentData.ramaID_MS = this.value;"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">อาจารย์ร่วม (Other Staff)</label>
                    <div id="other_staff_list" class="mb-2 p-2 border rounded bg-light min-vh-5" style="min-height: 45px;"></div>
                    <button type="button" id="btn_add_staff" class="btn btn-outline-primary btn-sm" onclick="openPicker('staff')">+ เพิ่มรายชื่ออาจารย์</button>
                </div>

                <div id="draft_upload_section" class="mb-3 mt-3 p-2 bg-light border rounded">
                    <label class="fw-bold">📄 Draft Protocol (PDF)</label>
                    <div id="input_draft_wrap">
                        <input type="file" id="file_protocol_draft" class="form-control form-control-sm mt-1" accept=".pdf" onchange="handleFileSelect('protocol_draft', this.id)">
                    </div>
                    <div id="existing_draft_link" class="mt-2" style="display:none;"></div>
                </div>
            </div>

            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2 text-primary">ความก้าวหน้า (Progress)</h5>
                <div id="progress-container"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="button" id="save-btn" class="btn btn-success w-100 py-2 fw-bold shadow" onclick="saveData()">💾 บันทึก / อัปเดตข้อมูล</button>
                <button type="button" class="btn btn-secondary w-100 py-2" onclick="closeForm()">ปิดฟอร์ม</button>
            </div>
        </form>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';
    const LIFF_ID = '2009730964-NicRUF0I';
    
    let currentUser = { id: '', ip: '', line_uid: '' };
    let masterData = {};
    let currentData = { other_research: [], other_staff: [] }; 
    let isViewer = false; 
    let pendingFiles = {}; 
    let currentPerms = {}; 
    
    const progressSteps = [
        { key: 'protocol_draft', label: 'Protocol Draft', role: 'MR', hasFile: 'draft_link' },
        { key: 'MS_protocol_draft', label: 'MS Protocol Draft', role: 'MS' },
        { key: 'EC_subm', label: 'EC Submission', role: 'MR' },
        { key: 'MS_EC_subm', label: 'MS EC Submission', role: 'MS' },
        { key: 'EC_correct', label: 'EC Correction', role: 'MR' },
        { key: 'MS_EC_correct', label: 'MS EC Correction', role: 'MS' },
        { key: 'EC_approve', label: 'EC Approve', role: 'MR', hasFile: 'EC_link', needsDates: true }, 
        { key: 'MS_EC_approve', label: 'MS EC Approve', role: 'MS' },
        { key: 'data_collect', label: 'Data Collect', role: 'MR' },
        { key: 'data_analysis', label: 'Data Analysis', role: 'MR' },
        { key: 'manu_draft', label: 'Manuscript Draft', role: 'MR', hasFile: 'manu_draft_link' },
        { key: 'MS_manu_draft', label: 'MS Manuscript Draft', role: 'MS' },
        { key: 'manu_submis', label: 'Manuscript Submission', role: 'MR' },
        { key: 'MS_manu_submis', label: 'MS Manuscript Submission', role: 'MS' },
        { key: 'manu_revise', label: 'Manuscript Revise', role: 'MR' },
        { key: 'MS_manu_revise', label: 'MS Manuscript Revise', role: 'MS' },
        { key: 'manu_accept', label: 'Manuscript Accept', role: 'MR', hasFile: 'Manu_link' }, 
        { key: 'presentation', label: 'Presentation', role: 'MR', needsText: true }, 
        { key: 'MS_manu_accept', label: 'MS Final Accept', role: 'MS' }
    ];

    // ==========================================
    // 🌟 ระบบเปิดเว็บและเตรียม LIFF (LINE)
    // ==========================================
    window.onload = async () => { 
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                currentUser.line_uid = profile.userId;
                document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน (เชื่อมต่อ LINE แล้ว)";
                document.getElementById('login-status').className = "text-success fw-bold";
            } else {
                document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน (โหมดเบราว์เซอร์ปกติ)";
                document.getElementById('login-status').className = "text-primary fw-bold";
            }
        } catch (e) {
            console.log("LIFF Init Error:", e);
            document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน (ไม่พบการเชื่อมต่อ LINE)";
            document.getElementById('login-status').className = "text-secondary fw-bold";
        } finally {
            document.getElementById('login-btn').disabled = false;
        }
    };

    function isSameID(id1, id2) {
        const c1 = (id1 || '').toString().replace(/^0+/, '') || '0';
        const c2 = (id2 || '').toString().replace(/^0+/, '') || '0';
        return c1 === c2;
    }

    function getSafeData(obj, key) {
        if (!key) return null;
        if (obj[key] !== undefined && obj[key] !== "") return obj[key];
        const foundKey = Object.keys(obj).find(k => k.toLowerCase() === key.toLowerCase());
        return foundKey ? obj[foundKey] : null;
    }

    function login() {
        let id = document.getElementById('login-ramaid').value.trim();
        if (!id) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ Rama ID', 'warning');
        
        id = id.replace(/^0+/, '');
        if (!id) id = "0"; 
        
        currentUser.id = id;
        fetchInitialData();
    }

    function fetchInitialData() {
        Swal.fire({ title: 'กำลังตรวจสอบสิทธิ์...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        // ส่ง lineUid เข้าไปเช็คในระบบหลังบ้านด้วย
        fetch(`${GAS_URL}?action=getInitialData&ramaID=${currentUser.id}&lineUid=${currentUser.line_uid || ''}`)
            .then(res => res.json())
            .then(data => {
                
                // ==========================================
                // 🌟 ตรวจจับการเรียกหา LINE Login
                // ==========================================
                if (data.requireLineLogin) {
                    Swal.fire({
                        title: '🔒 การยืนยันตัวตน',
                        text: data.message,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: 'ล็อกอินด้วย LINE',
                        cancelButtonText: 'ยกเลิก',
                        confirmButtonColor: '#06C755'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            liff.login(); // เด้งไปหน้าจอ LINE Login อัตโนมัติ
                        }
                    });
                    return; // เบรกการทำงานตรงนี้
                }

                if(data.error) return Swal.fire('Error', data.error, 'error');
                if(data.currentUserName === "ไม่พบชื่อในระบบ") return Swal.fire('ไม่อนุญาต', 'ไม่พบรหัสนี้ในฐานข้อมูล', 'warning');
                
                document.getElementById('display-username').innerText = data.currentUserName;
                masterData = data;
                
                const oldSelection = document.getElementById('research-selector').value;

                let html = '<option value="">-- เลือกงานวิจัย --</option>';
                data.researches.forEach(r => html += `<option value="${r.rowIndex}">${r.Title || 'ไม่ระบุชื่อ'}</option>`);
                html += `<option value="new" class="text-primary fw-bold">+ สร้างงานวิจัยใหม่</option>`;
                document.getElementById('research-selector').innerHTML = html;
                
                let msHTML = '<option value="">-- เลือกอาจารย์ที่ปรึกษา --</option>';
                data.mainStaffs.forEach(s => msHTML += `<option value="${s.id}">${s.name}</option>`);
                document.getElementById('ramaID_MS').innerHTML = msHTML;

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';

                if(oldSelection) {
                    document.getElementById('research-selector').value = oldSelection;
                    loadResearch(oldSelection);
                }

                Swal.close();
            }).catch(e => Swal.fire('Error', 'เชื่อมต่อล้มเหลว', 'error'));
    }

    function closeForm() {
        document.getElementById('research-form').style.display = 'none';
        document.getElementById('research-selector').value = '';
        document.getElementById('role-badge').style.display = 'none';
    }

    function openPicker(type) {
        if(isViewer) return; 
        const isDoctor = (type === 'doctor');
        const fullList = isDoctor ? masterData.doctors : masterData.otherStaffs;
        const currentField = isDoctor ? 'other_research' : 'other_staff';
        const alreadySelected = currentData[currentField] || [];

        const mrID = getSafeData(currentData, 'ramaID_MR');
        const msID = document.getElementById('ramaID_MS').value;

        const filteredList = fullList.filter(item => {
            if (isDoctor && isSameID(item.id, mrID)) return false;
            if (!isDoctor && isSameID(item.id, msID)) return false;
            return true;
        });

        let optionsHTML = `<div class="text-start" style="max-height: 300px; overflow-y: auto;">`;
        if(filteredList.length === 0) {
            optionsHTML += `<div class="text-muted text-center py-3">ไม่มีรายชื่อให้เลือก</div>`;
        } else {
            filteredList.forEach(item => {
                const checked = alreadySelected.includes(item.name) ? 'checked' : '';
                optionsHTML += `<div class="form-check mb-2"><input class="form-check-input" type="checkbox" value="${item.name}" id="chk_${item.id}" ${checked}> <label class="form-check-label" for="chk_${item.id}">${item.name}</label></div>`;
            });
        }
        optionsHTML += `</div>`;

        Swal.fire({ title: 'เลือกรายชื่อ', html: optionsHTML, showCancelButton: true, confirmButtonText: 'ตกลง' }).then((result) => {
            if (result.isConfirmed) {
                const selected = [];
                document.querySelectorAll('.form-check-input:checked').forEach(cb => selected.push(cb.value));
                currentData[currentField] = selected;
                updateTagDisplay(type);
            }
        });
    }

    function updateTagDisplay(type) {
        const field = (type === 'doctor') ? 'other_research' : 'other_staff';
        const container = document.getElementById(field + '_list');
        const data = currentData[field] || [];

        if (data.length === 0) {
            container.innerHTML = '<span class="text-muted small">ยังไม่ได้เลือกรายชื่อ</span>';
            return;
        }
        container.innerHTML = data.map((name, index) => `<span class="tag-item">${name} ${!isViewer ? `<span class="tag-remove" onclick="removeTag('${type}', ${index})">×</span>` : ''}</span>`).join('');
    }

    function removeTag(type, index) {
        if(isViewer) return;
        currentData[type === 'doctor' ? 'other_research' : 'other_staff'].splice(index, 1);
        updateTagDisplay(type);
    }

    function handleFileSelect(key, inputId) {
        const input = document.getElementById(inputId);
        if (input && input.files.length > 0) {
            const reader = new FileReader();
            reader.onload = () => { pendingFiles[key] = reader.result; checkConditions(); };
            reader.readAsDataURL(input.files[0]);
        } else {
            delete pendingFiles[key]; checkConditions();
        }
    }

    function loadResearch(val) {
        const form = document.getElementById('research-form');
        pendingFiles = {}; 

        if (!val) { closeForm(); return; }
        form.style.display = 'block';

        if (val === 'new') {
            currentData = { ramaID_MR: currentUser.id, other_research: [], other_staff: [] };
            form.reset();
            currentData.main_research = masterData.currentUserName;
            document.getElementById('mr_name_display').innerText = `👨‍⚕️ ผู้วิจัยหลัก (MR): ${currentData.main_research}`;
            document.getElementById('mr_name_display').style.display = 'block';
            document.getElementById('Title').readOnly = false;
            document.getElementById('ramaID_MS').disabled = false;
            document.getElementById('existing_draft_link').style.display = 'none';
        } else {
            const res = masterData.researches.find(r => r.rowIndex == val);
            currentData = { ...res };
            
            const rawOR = getSafeData(res, 'other_research');
            const rawOS = getSafeData(res, 'other_staff');
            currentData.other_research = rawOR ? String(rawOR).split('\n').filter(n => n) : [];
            currentData.other_staff = rawOS ? String(rawOS).split('\n').filter(n => n) : [];
            
            const dbMR = getSafeData(res, 'ramaID_MR');
            const dbMS = getSafeData(res, 'ramaID_MS');
            const mrNameStr = getSafeData(res, 'main_research') || masterData.doctors.find(d => isSameID(d.id, dbMR))?.name || dbMR;
            
            document.getElementById('mr_name_display').innerText = `👨‍⚕️ ผู้วิจัยหลัก (MR): ${mrNameStr}`;
            document.getElementById('mr_name_display').style.display = 'block';

            document.getElementById('Title').value = getSafeData(res, 'Title') || '';
            document.getElementById('Title').readOnly = true;
            document.getElementById('ramaID_MS').value = dbMS || '';
            document.getElementById('ramaID_MS').disabled = true;

            const draftLinkContainer = document.getElementById('existing_draft_link');
            const safeDraftLink = getSafeData(res, 'draft_link');
            if(safeDraftLink && safeDraftLink.trim() !== '') {
                draftLinkContainer.innerHTML = `<a href="${safeDraftLink}" target="_blank" class="badge bg-primary text-decoration-none p-2 mt-2">🔍 ดูไฟล์ Draft ที่แนบไว้แล้ว</a>`;
                draftLinkContainer.style.display = 'block';
            } else { draftLinkContainer.style.display = 'none'; }
        }

        const myName = (masterData.currentUserName || "").trim();
        const dbMR = getSafeData(currentData, 'ramaID_MR');
        const dbMS = getSafeData(currentData, 'ramaID_MS');
        
        currentPerms.isMR = isSameID(currentUser.id, dbMR);
        currentPerms.isMS = isSameID(currentUser.id, dbMS);
        currentPerms.isOS = currentData.other_staff.some(n => n.trim() === myName);
        currentPerms.isOR = currentData.other_research.some(n => n.trim() === myName);
        currentPerms.isStaffGroup = (masterData.otherStaffs || []).some(s => isSameID(s.id, currentUser.id));

        currentPerms.canViewAllFiles = currentPerms.isMR || currentPerms.isMS || currentPerms.isOS || currentPerms.isStaffGroup;
        
        isViewer = !currentPerms.isMR && !currentPerms.isMS;

        let badgeText = "ผู้เยี่ยมชม (ไม่มีสิทธิ์)";
        let badgeClass = "bg-secondary";
        
        if (currentPerms.isMR) { badgeText = "ผู้วิจัยหลัก (MR)"; badgeClass = "bg-success"; }
        else if (currentPerms.isMS) { badgeText = "อ.ที่ปรึกษา (MS)"; badgeClass = "bg-primary"; }
        else if (currentPerms.isOS) { badgeText = "อาจารย์ร่วม (OS)"; badgeClass = "bg-info text-dark"; }
        else if (currentPerms.isStaffGroup) { badgeText = "ทีมอาจารย์ (Staff)"; badgeClass = "bg-info text-dark"; }
        else if (currentPerms.isOR) { badgeText = "แพทย์ร่วม (OR)"; badgeClass = "bg-warning text-dark"; }

        const badgeEl = document.getElementById('role-badge');
        badgeEl.innerText = `🛡️ สิทธิ์: ${badgeText}`;
        badgeEl.className = `badge shadow-sm me-1 ${badgeClass}`;
        badgeEl.style.display = 'inline-block';

        document.getElementById('save-btn').style.display = isViewer ? 'none' : 'block';
        document.getElementById('btn_add_doctor').style.display = isViewer ? 'none' : 'inline-block';
        document.getElementById('btn_add_staff').style.display = isViewer ? 'none' : 'inline-block';
        document.getElementById('input_draft_wrap').style.display = isViewer ? 'none' : 'block'; 

        updateTagDisplay('doctor');
        updateTagDisplay('staff');
        if(document.getElementById('file_protocol_draft')) document.getElementById('file_protocol_draft').value = '';
        renderProgress();
    }

    function renderProgress() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        let prevOk = true;
        
        progressSteps.forEach(step => {
            const val = getSafeData(currentData, step.key);
            const isMyRole = (step.role === 'MR' && currentPerms.isMR) || (step.role === 'MS' && currentPerms.isMS);
            
            let isActionLocked = (!prevOk || !isMyRole || isViewer);
            let needsCondition = false;

            if (!val && prevOk && isMyRole && !isViewer) {
                if (step.hasFile || step.needsDates || step.needsText) {
                    needsCondition = true;
                    isActionLocked = true; 
                }
            }

            let cardStyle = 'bg-white';
            if (!val) {
                if (needsCondition) cardStyle = 'condition-wait';
                else if (isActionLocked) cardStyle = 'step-locked';
            }

            const displayBtnText = (step.needsText && val) ? '✔️ บันทึกข้อมูลแล้ว' : (val || 'ลงเวลา');

            let html = `
                <div class="card p-2 step-card mb-2 ${cardStyle} shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="fw-bold text-dark">${step.label} <span class="badge bg-secondary">${step.role}</span></small>
                        <button type="button" id="btn_${step.key}" data-needs-check="${needsCondition}" class="btn btn-sm ${val ? 'btn-success' : 'btn-outline-primary'}" 
                            onclick="stamp('${step.key}')" ${isActionLocked || val ? 'disabled' : ''}>
                            ${displayBtnText}
                        </button>
                    </div>`;

            if(step.hasFile && step.key !== 'protocol_draft' && prevOk && isMyRole && !val && !isViewer) {
                html += `<div class="mt-2"><input type="file" id="file_${step.key}" class="form-control form-control-sm" accept=".pdf" onchange="handleFileSelect('${step.key}', this.id)"></div>`;
            }

            const fileUrl = getSafeData(currentData, step.hasFile);
            if (val && fileUrl) {
                if (step.key === 'protocol_draft' || currentPerms.canViewAllFiles) {
                    html += `<div class="mt-2"><a href="${fileUrl}" target="_blank" class="badge bg-primary text-decoration-none p-2 shadow-sm" style="pointer-events: auto;">🔍 ดูไฟล์ที่แนบไว้</a></div>`;
                } else {
                    html += `<div class="mt-2"><span class="badge bg-secondary p-1" style="font-size:0.75rem;">🔒 สงวนสิทธิ์เฉพาะผู้วิจัยและอาจารย์</span></div>`;
                }
            }

            if (step.needsDates && prevOk && isMyRole && !val && !isViewer) {
                html += `
                <div class="mt-2 row gx-2 bg-light p-2 rounded border">
                    <div class="col-12 mb-1"><small class="text-danger fw-bold">* แนบไฟล์ และระบุวันที่ให้ครบ เพื่อปลดล็อค</small></div>
                    <div class="col-6"><label class="small text-muted fw-bold">วันที่อนุมัติ</label><input type="date" id="date_${step.key}" class="form-control form-control-sm" onchange="checkConditions()"></div>
                    <div class="col-6"><label class="small text-muted fw-bold">วันหมดอายุ</label><input type="date" id="expire_${step.key}" class="form-control form-control-sm" onchange="checkConditions()"></div>
                </div>`;
            }
            if (step.needsDates && val) {
                const appDate = getSafeData(currentData, 'EC_approve_date') || '-';
                const expDate = getSafeData(currentData, 'EC_expire_date') || '-';
                html += `<div class="mt-2 small text-success fw-bold">📅 อนุมัติ: ${appDate} | หมดอายุ: ${expDate}</div>`;
            }

            if (step.needsText && prevOk && isMyRole && !val && !isViewer) {
                html += `<div class="mt-2"><input type="text" id="text_${step.key}" class="form-control form-control-sm" placeholder="ระบุรายละเอียด Presentation..." oninput="checkConditions()"></div>`;
            }
            if (step.needsText && val) {
                html += `<div class="mt-2 small text-success fw-bold">📝 รายละเอียด: <span class="text-dark">${val}</span></div>`;
            }

            html += `</div>`;
            container.innerHTML += html;
            if (!val) prevOk = false; 
        });

        checkConditions();
    }

    function checkConditions() {
        if (isViewer) return;

        progressSteps.forEach(step => {
            const btn = document.getElementById(`btn_${step.key}`);
            if (btn && btn.getAttribute('data-needs-check') === 'true') {
                let locked = false;

                if (step.hasFile) {
                    const hasNewFile = !!pendingFiles[step.key];
                    const oldFileUrl = getSafeData(currentData, step.hasFile);
                    const hasOldFile = oldFileUrl && oldFileUrl.trim() !== '';
                    if (!hasNewFile && !hasOldFile) locked = true;
                }

                if (step.needsDates) {
                    const d1 = document.getElementById(`date_${step.key}`);
                    const d2 = document.getElementById(`expire_${step.key}`);
                    if (!(d1 && d1.value) || !(d2 && d2.value)) locked = true;
                }

                if (step.needsText) {
                    const txt = document.getElementById(`text_${step.key}`);
                    if (!txt || !txt.value.trim()) locked = true;
                }

                btn.disabled = locked;
            }
        });
    }

    function stamp(key) {
        if(isViewer) return;
        const step = progressSteps.find(s => s.key === key);

        if(key === 'EC_approve') {
            currentData['EC_approve_date'] = document.getElementById(`date_${key}`).value;
            currentData['EC_expire_date'] = document.getElementById(`expire_${key}`).value;
        }

        if(step.needsText) {
            currentData[key] = document.getElementById(`text_${key}`).value;
        } else {
            currentData[key] = new Date().toLocaleString('th-TH');
        }
        
        renderProgress();
    }

    async function saveData() {
        if(isViewer) return; 
        try {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const payload = { ...currentData };
            payload.Title = document.getElementById('Title').value;
            payload.ramaID_MS = document.getElementById('ramaID_MS').value;
            payload.main_staff = document.getElementById('ramaID_MS').options[document.getElementById('ramaID_MS').selectedIndex]?.text;
            if (!payload.main_research) payload.main_research = currentData.main_research;
            payload.other_research = currentData.other_research.join('\n');
            payload.other_staff = currentData.other_staff.join('\n');

            payload.draftLinkBase64 = pendingFiles['protocol_draft'] || null;
            payload.ecLinkBase64 = pendingFiles['EC_approve'] || null;
            payload.manuDraftBase64 = pendingFiles['manu_draft'] || null;
            payload.manuLinkBase64 = pendingFiles['manu_accept'] || null;

            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'saveResearch', payload: payload }) });
            const res = await resp.json();
            
            if (res.status === 'success') {
                Swal.fire('สำเร็จ', res.message, 'success').then(() => {
                    fetchInitialData(); 
                });
            }
        } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
    }
</script>
</body>
</html>
