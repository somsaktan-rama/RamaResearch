<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Rama Tracker v2.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .step-card { border-left: 4px solid #0d6efd; margin-bottom: 15px; }
        .step-locked { opacity: 0.5; pointer-events: none; border-left: 4px solid #6c757d; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center mb-4 text-primary">ิดตามงานวิจัยผิวหนัง รามาธิบดี 1.21</h3>

    <div id="login-section" class="card shadow-sm p-4">
        <div class="text-center mb-3">
            <span id="login-status" class="text-warning fw-bold">กำลังเตรียมความพร้อมระบบ...</span>
        </div>
        <div class="mb-3">
            <label class="form-label">Rama ID</label>
            <input type="tel" id="login-ramaid" class="form-control" placeholder="ระบุ Rama ID (ตัวเลขเท่านั้น)" inputmode="numeric" pattern="[0-9]*">
        </div>
        <button id="login-btn" class="btn btn-primary w-100" onclick="login()" disabled>เข้าสู่ระบบ</button>
    </div>

    <div id="app-section" style="display:none;">
        
        <div class="alert alert-info py-2 mb-3 shadow-sm">
            👤 ผู้ใช้งาน: <span id="display-username" class="fw-bold text-primary"></span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">เลือกงานวิจัย</label>
            <select id="research-selector" class="form-select border-primary" onchange="loadResearch(this.value)">
                <option value="">-- กำลังโหลดข้อมูล... --</option>
            </select>
        </div>

        <form id="research-form" style="display:none;">
            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2 text-primary">ข้อมูลทั่วไป</h5>
                <div class="mb-2">
                    <label>Title (ชื่อเรื่อง)</label>
                    <input type="text" id="Title" class="form-control" required>
                </div>
                <div class="mb-2">
                    <label>Main Research (MR)</label>
                    <input type="text" id="ramaID_MR" class="form-control" readonly>
                </div>
                
                <div class="mb-2">
                    <label class="fw-bold">Other Research (แพทย์)</label>
                    <div id="other_research_display" class="p-2 border rounded bg-light mb-1" style="display:none; white-space: pre-wrap; font-size: 0.9rem;"></div>
                    <select id="other_research" class="form-select" multiple style="min-height: 100px;"></select>
                </div>

                <div class="mb-2">
                    <label>Main Staff (MS - อาจารย์ที่ปรึกษาหลัก)</label>
                    <select id="ramaID_MS" class="form-select" required></select>
                </div>
                
                <div class="mb-2">
                    <label class="fw-bold">Other Staff (อาจารย์)</label>
                    <div id="other_staff_display" class="p-2 border rounded bg-light mb-1" style="display:none; white-space: pre-wrap; font-size: 0.9rem;"></div>
                    <select id="other_staff" class="form-select" multiple style="min-height: 100px;"></select>
                </div>

                <div class="mb-2 mt-3 p-2 bg-light border rounded">
                    <label class="fw-bold">📄 แนบไฟล์ Draft Protocol (PDF)</label>
                    <input type="file" id="draft_link_file" class="form-control form-control-sm mt-1" accept=".pdf">
                </div>
            </div>

            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2 text-primary">ความก้าวหน้า (Progress)</h5>
                <div id="progress-container"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-success w-100 py-2 fw-bold" onclick="saveData()">💾 บันทึกข้อมูล</button>
                <button type="button" class="btn btn-danger w-100 py-2" onclick="location.reload()">ยกเลิก / ออก</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 🚨 🚨 🚨 ใส่ URL ของ Google Apps Script ของคุณที่นี่ 🚨 🚨 🚨
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';
    
    let currentUser = { id: '', ip: '' };
    let masterData = {};
    let currentData = {};
    
    const progressSteps = [
        { key: 'protocol_draft', label: 'Protocol Draft', role: 'MR' },
        { key: 'MS_protocol_draft', label: 'MS Protocol Draft', role: 'MS' },
        { key: 'EC_subm', label: 'EC Submission', role: 'MR' },
        { key: 'MS_EC_subm', label: 'MS EC Submission', role: 'MS' },
        { key: 'EC_correct', label: 'EC Correction', role: 'MR' },
        { key: 'MS_EC_correct', label: 'MS EC Correction', role: 'MS' },
        { key: 'EC_approve', label: 'EC Approve', role: 'MR', hasFile: 'EC_link' },
        { key: 'MS_EC_approve', label: 'MS EC Approve', role: 'MS' },
        { key: 'data_collect', label: 'Data Collect', role: 'MR' },
        { key: 'data_analysis', label: 'Data Analysis', role: 'MR' },
        { key: 'manu_draft', label: 'Manuscript Draft', role: 'MR' },
        { key: 'MS_manu_draft', label: 'MS Manuscript Draft', role: 'MS' },
        { key: 'manu_submis', label: 'Manuscript Submission', role: 'MR' },
        { key: 'MS_manu_submis', label: 'MS Manuscript Submission', role: 'MS' },
        { key: 'manu_revise', label: 'Manuscript Revise', role: 'MR' },
        { key: 'MS_manu_revise', label: 'MS Manuscript Revise', role: 'MS' },
        { key: 'manu_accept', label: 'Manuscript Accept', role: 'MR', hasFile: 'Manu_link' },
        { key: 'presentation', label: 'Presentation', role: 'MR' },
        { key: 'MS_manu_accept', label: 'MS Final Accept', role: 'MS' }
    ];

    window.onload = async function() {
        try {
            if (!navigator.userAgent.includes("LINE")) {
                let response = await fetch('https://api.ipify.org?format=json').catch(() => null);
                if(response) {
                    let data = await response.json();
                    currentUser.ip = data.ip; 
                }
            }
        } catch(e) { console.log("ข้ามการดึง IP"); } 
        finally { enableLogin(); }
    };

    function enableLogin() {
        document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน";
        document.getElementById('login-status').className = "text-success fw-bold";
        document.getElementById('login-btn').disabled = false;
    }

    function login() {
        const id = document.getElementById('login-ramaid').value.trim();
        if (!id) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ Rama ID', 'warning');
        currentUser.id = id;
        fetchInitialData();
    }

    function fetchInitialData() {
        Swal.fire({ title: 'กำลังตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        fetch(`${GAS_URL}?action=getInitialData&ramaID=${currentUser.id}`)
            .then(res => res.json())
            .then(data => {
                if(data.error) return Swal.fire('เกิดข้อผิดพลาด', data.error, 'error');
                if(data.currentUserName === "ไม่พบชื่อในระบบ") {
                    document.getElementById('login-ramaid').value = ''; 
                    return Swal.fire('ไม่อนุญาต', 'ไม่พบ Rama ID นี้ในระบบ', 'warning');
                }
                document.getElementById('display-username').innerText = data.currentUserName;
                populateDropdowns(data);
            }).catch(err => {
                console.error(err);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            });
    }

    function populateDropdowns(data) {
        try {
            masterData = data;
            
            let researchHTML = '<option value="">-- กรุณาเลือก --</option>'; 
            if (data.researches && data.researches.length > 0) {
                data.researches.forEach((res, i) => {
                    let title = res.Title || res.title || res.TITLE || `งานวิจัย (ไม่มีชื่อ) แถวที่ ${res.rowIndex}`;
                    let val = res.rowIndex || i;
                    researchHTML += `<option value="${val}">${title}</option>`;
                });
            }
            researchHTML += '<option value="new" class="text-primary fw-bold">+ สร้างงานวิจัยใหม่</option>';
            document.getElementById('research-selector').innerHTML = researchHTML; 

            let msHTML = '<option value="">-- เลือกอาจารย์ที่ปรึกษาหลัก --</option>';
            if(data.mainStaffs) data.mainStaffs.forEach(s => msHTML += `<option value="${s.id}">${s.name}</option>`);
            document.getElementById('ramaID_MS').innerHTML = msHTML;

            let orHTML = '';
            if(data.doctors) data.doctors.forEach(d => orHTML += `<option value="${d.id}">${d.name}</option>`);
            document.getElementById('other_research').innerHTML = orHTML;

            let osHTML = '';
            if(data.otherStaffs) data.otherStaffs.forEach(s => osHTML += `<option value="${s.id}">${s.name}</option>`);
            document.getElementById('other_staff').innerHTML = osHTML;

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            Swal.close(); 
        } catch (error) {
            console.error(error);
            Swal.fire('ข้อผิดพลาด', 'แสดงผล Dropdown ไม่สำเร็จ', 'error');
        }
    }

    // ฟังก์ชันใหม่: สลับการแสดงผล โชว์ข้อความ หรือ โชว์ Dropdown
    function toggleDropdownVisibility(fieldKey, selectId, displayId) {
        const select = document.getElementById(selectId);
        const display = document.getElementById(displayId);
        const value = currentData[fieldKey];

        if (value && value.toString().trim() !== "") {
            display.innerText = value;
            display.style.display = 'block';
            select.style.display = 'none';
        } else {
            display.style.display = 'none';
            select.style.display = 'block';
        }
    }

    function loadResearch(val) {
        const form = document.getElementById('research-form');
        if (!val) { form.style.display = 'none'; return; }

        form.style.display = 'block'; 
        
        if (val === 'new') {
            currentData = { ramaID_MR: currentUser.id };
            form.reset(); 
            document.getElementById('ramaID_MR').value = currentUser.id;
            document.getElementById('Title').readOnly = false;
            
            // งานวิจัยใหม่ ให้โชว์ Dropdown ให้เลือกคนเสมอ
            toggleDropdownVisibility('other_research', 'other_research', 'other_research_display');
            toggleDropdownVisibility('other_staff', 'other_staff', 'other_staff_display');
        } else {
            currentData = masterData.researches.find(r => r.rowIndex == val);
            document.getElementById('Title').value = currentData.Title || "";
            document.getElementById('Title').readOnly = true; 
            document.getElementById('ramaID_MR').value = currentData.ramaID_MR || "";
            document.getElementById('ramaID_MS').value = currentData.ramaID_MS || "";
            
            // เช็คว่ามีข้อมูลเดิมไหม ถ้ามีก็โชว์ข้อความ ถ้าไม่มีก็โชว์ Dropdown
            toggleDropdownVisibility('other_research', 'other_research', 'other_research_display');
            toggleDropdownVisibility('other_staff', 'other_staff', 'other_staff_display');
        }
        renderProgress(); 
    }

    function renderProgress() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        let previousFilled = true; 
        
        progressSteps.forEach((step) => {
            const isFilled = currentData[step.key] ? true : false;
            const isMyRole = (step.role === 'MR' && currentUser.id == currentData.ramaID_MR) || 
                             (step.role === 'MS' && currentUser.id == currentData.ramaID_MS);
            
            const lockedClass = (!previousFilled || !isMyRole) ? 'step-locked' : '';
            
            let html = `
            <div class="card p-2 step-card ${lockedClass} bg-white shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold text-dark" style="font-size:0.9rem;">${step.label} <span class="badge bg-secondary">${step.role}</span></span>
                    <button type="button" class="btn btn-sm ${isFilled ? 'btn-success' : 'btn-outline-primary'}"
                        onclick="stampTime('${step.key}')" ${!previousFilled || !isMyRole ? 'disabled' : ''}>
                        ${isFilled ? currentData[step.key] : 'ลงเวลา'}
                    </button>
                </div>
            `;
            
            if(step.hasFile && previousFilled && isMyRole && !isFilled) {
                html += `<div class="mt-2"><input type="file" id="file_${step.key}" class="form-control form-control-sm" accept=".pdf"></div>`;
            }
            
            html += `</div>`;
            container.innerHTML += html;
            
            if (!isFilled) previousFilled = false; 
        });
    }

    function stampTime(key) {
        const now = new Date().toLocaleString('th-TH');
        currentData[key] = now;
        renderProgress(); 
    }

    // ฟังก์ชันใหม่: ดึงชื่อคนที่ถูกเลือก คั่นด้วยการขึ้นบรรทัดใหม่
    function getMultiValues(selectId) {
        const select = document.getElementById(selectId);
        // ถ้าช่องเลือกถูกซ่อนอยู่ แสดงว่ามีข้อมูลเดิมแล้ว ห้ามส่งค่าว่างไปทับ
        if(!select || select.style.display === 'none') return null; 
        return Array.from(select.selectedOptions).map(opt => opt.text).join('\n');
    }

    async function saveData() {
        try {
            Swal.fire({ title: '1. กำลังเตรียมข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            currentData.Title = document.getElementById('Title').value;
            if(!currentData.Title) throw new Error("กรุณาระบุชื่อเรื่อง (Title)");

            const msSelect = document.getElementById('ramaID_MS');
            currentData.ramaID_MS = msSelect.value;
            currentData.main_staff = msSelect.options[msSelect.selectedIndex]?.text || "";
            
            // ดึงค่า Other Research และ Other Staff แบบใหม่
            const newOtherRes = getMultiValues('other_research');
            if (newOtherRes !== null) currentData.other_research = newOtherRes;

            const newOtherStaff = getMultiValues('other_staff');
            if (newOtherStaff !== null) currentData.other_staff = newOtherStaff;

            const fileToBase64 = (fileInputId) => new Promise((resolve, reject) => {
                const fileInput = document.getElementById(fileInputId);
                if (!fileInput || fileInput.files.length === 0) return resolve(null);
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });

            Swal.fire({ title: '2. จัดการไฟล์แนบ (ถ้ามี)...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            currentData.draftLinkBase64 = await fileToBase64('draft_link_file');
            currentData.ecLinkBase64 = await fileToBase64('file_EC_approve');
            currentData.manuLinkBase64 = await fileToBase64('file_manu_accept');

            Swal.fire({ title: '3. กำลังส่งขึ้นระบบฐานข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'saveResearch', payload: currentData })
            });

            const resultText = await response.text(); 
            const result = JSON.parse(resultText); 

            if (result.status === 'success') {
                Swal.fire('บันทึกสำเร็จ!', result.message, 'success').then(() => location.reload());
            } else {
                throw new Error(result.message || 'ไม่ทราบสาเหตุจาก Server');
            }

        } catch (error) {
            console.error(error);
            Swal.fire('บันทึกไม่สำเร็จ', error.message, 'error');
        }
    }
</script>
</body>
</html>
