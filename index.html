<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rama Research Tracking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<div class="container py-4">
  <h4 class="mb-4 text-center text-primary">Rama Research Tracking</h4>

  <div id="loadingScreen" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">กำลังตรวจสอบข้อมูล LINE Login...</p>
  </div>

  <div id="errorScreen" style="display:none;" class="alert alert-danger text-center"></div>

  <div id="bindingScreen" style="display:none;" class="card shadow-sm mx-auto mt-4" style="max-width: 400px;">
    <div class="card-body text-center">
      <h5 class="card-title text-primary mb-3">ลงทะเบียนเข้าใช้งานครั้งแรก</h5>
      <p class="text-muted small mb-4">ระบบจะทำการผูกบัญชี LINE ของท่านกับ Rama ID เพื่อเข้าสู่ระบบอัตโนมัติในครั้งถัดไป</p>
      
      <div class="mb-3 text-start">
        <label class="form-label fw-bold">กรุณาระบุ Rama ID ของท่าน</label>
        <input type="text" id="inputRamaID" class="form-control" placeholder="เช่น 123456">
      </div>
      
      <button class="btn btn-primary w-100" onclick="bindAccount()">ยืนยันและเข้าสู่ระบบ</button>
      <div id="bindingError" class="text-danger mt-2 small" style="display:none;"></div>
    </div>
  </div>
  
  <div id="mainApp" style="display:none;">
    <div class="alert alert-success">
      ยินดีต้อนรับ, <span id="displayUserName" class="fw-bold"></span> 
      (Rama ID: <span id="displayRamaID"></span> - <span id="displayGroup"></span>)
    </div>
    
    <button class="btn btn-primary mb-3" onclick="loadMyProjects()">โหลดรายการงานวิจัยของฉัน</button>
    
    <div id="researchContainer"></div>
  </div>
</div>

<script>
  // ==========================================
  // ตั้งค่า 2 ตัวนี้ให้ถูกต้อง
  const LIFF_ID = "2009730964-NicRUF0I"; 
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec";
  // ==========================================

  let currentUser = {}; // เก็บข้อมูลหมอ/อาจารย์ที่ล็อคอิน

  window.onload = function() {
    initializeLiff();
  };

// ฟังก์ชันตรวจสอบว่าใช้งานผ่าน PC หรือไม่
  function isDevicePC() {
    // 1. ตรวจสอบจาก LIFF ว่าเปิดในแอป LINE บนมือถือหรือไม่
    if (liff.isInClient()) {
      return false; // ถ้าเปิดในแอป LINE ถือว่าเป็นมือถือ
    }
    
    // 2. ตรวจสอบจาก User-Agent ของ Browser
    const isMobileBrowser = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    return !isMobileBrowser; // ถ้าไม่ใช่ Mobile ให้ถือว่าเป็น PC
  }
  
  // 1. เริ่มการทำงานของ LINE LIFF
  async function initializeLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        checkUserInSystem();
      } else {
        liff.login(); // บังคับเด้งไปหน้า Login ของ LINE
      }
    } catch (err) {
      showError("LIFF Init Error: " + err);
    }
  }

let currentLineUid = ""; // สร้างตัวแปรเก็บ UID ไว้ชั่วคราวตอนผูกบัญชี

  // แก้ไขฟังก์ชันตรวจสอบผู้ใช้
  async function checkUserInSystem() {
    try {
      const profile = await liff.getProfile();
      currentLineUid = profile.userId; // เก็บไว้ใช้ตอนกรอก Rama ID
      
      const response = await fetch(`${GAS_WEB_APP_URL}?action=loginByLine&lineUid=${currentLineUid}`);
      const data = await response.json();

      document.getElementById('loadingScreen').style.display = 'none';

      if (data.status === 'success') {
        // กรณีที่ 1: เคยผูกบัญชีแล้ว -> เข้าสู่แอปหลัก
        setupMainApp(data); 
      } else {
        // กรณีที่ 2: ยังไม่เคยผูกบัญชี (ไม่พบ UID) -> แสดงหน้ากรอก Rama ID
        document.getElementById('bindingScreen').style.display = 'block';
      }
    } catch (err) {
      showError("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + err);
    }
  }

  // ฟังก์ชันใหม่: ส่ง Rama ID ไปผูกกับ LINE UID
  async function bindAccount() {
    const ramaID = document.getElementById('inputRamaID').value.trim();
    const errorBox = document.getElementById('bindingError');
    
    if (!ramaID) {
      errorBox.innerText = "กรุณาระบุ Rama ID";
      errorBox.style.display = 'block';
      return;
    }

    // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
    const btn = document.querySelector('#bindingScreen button');
    btn.disabled = true;
    btn.innerText = "กำลังตรวจสอบข้อมูล...";
    errorBox.style.display = 'none';

    try {
      // ยิง POST ไปที่ GAS เพื่อทำการผูกบัญชี
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'bindAccount',
          ramaID: ramaID,
          lineUid: currentLineUid
        })
      });
      const data = await response.json();

      if (data.status === 'success') {
        // ผูกสำเร็จ -> ซ่อนหน้าผูกบัญชี และเปิดแอปหลัก
        document.getElementById('bindingScreen').style.display = 'none';
        setupMainApp(data);
        alert('ลงทะเบียนและผูกบัญชีสำเร็จ!');
      } else {
        // หา Rama ID ไม่เจอใน Sheet staff
        errorBox.innerText = data.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "ยืนยันและเข้าสู่ระบบ";
      }
    } catch (err) {
      errorBox.innerText = "เกิดข้อผิดพลาด: " + err;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerText = "ยืนยันและเข้าสู่ระบบ";
    }
  }

  // ฟังก์ชันแยกสำหรับตั้งค่าหน้าหลัก (เพื่อลดความซ้ำซ้อน)
  function setupMainApp(userData) {
    currentUser = userData;
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('displayUserName').innerText = userData.name;
    document.getElementById('displayRamaID').innerText = userData.ramaID;
    document.getElementById('displayGroup').innerText = userData.group;
    
    // โหลดรายชื่องานวิจัย หรือรายชื่อ Staff ต่อตาม Logic ของคุณ
    // loadInitialData(); 
  }

  // 3. ฟังก์ชันตัวอย่างในการยิง GET API ดึงรายชื่องานวิจัย
  async function loadMyProjects() {
    try {
      // (ส่วนนี้เป็นคำสั่ง fetch API ดึงข้อมูลของคุณตามปกติ)
      const response = await fetch(`${GAS_WEB_APP_URL}?action=getResearchList&ramaID=${currentUser.ramaID}`);
      const result = await response.json();
      
      if(result.status === 'success') {
        currentProjects = result.data; // เก็บข้อมูลงานวิจัยที่ดึงมา
        const select = document.getElementById('projectSelect');
        select.innerHTML = ''; // ล้างค่าเก่าก่อน
        
        // --- ส่วนที่เพิ่มเงื่อนไขตรวจ PC ---
        if (isDevicePC()) {
          select.innerHTML += '<option value="NEW">-- ➕ สร้างงานวิจัยใหม่ --</option>';
        } else {
          select.innerHTML += '<option value="" disabled selected>-- เลือกงานวิจัยเพื่ออัปเดตความก้าวหน้า --</option>';
        }
        // -----------------------------
        
        // วนลูปนำงานวิจัยเก่ามาแสดง
        currentProjects.forEach((proj, idx) => {
          select.innerHTML += `<option value="${idx}">${proj.Title || 'ไม่ระบุชื่อ'} (${proj.EC_approve ? 'Approved' : 'Draft'})</option>`;
        });
        
        // บังคับให้หน้าฟอร์มรีเซ็ตตามค่าที่เลือก
        handleProjectChange(); 
      }
    } catch (err) {
      console.error("โหลดข้อมูลล้มเหลว:", err);
    }
  }

  // 4. ฟังก์ชันตัวอย่างในการยิง POST API บันทึกข้อมูล
  async function apiSaveData(formDataObj) {
    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        // สำคัญ: ห้ามใส่ header 'Content-Type': 'application/json' เพื่อป้องกัน CORS Preflight error
        body: JSON.stringify({
          action: 'saveData',
          formData: formDataObj
        })
      });
      const result = await response.json();
      if(result.status === 'success') alert('บันทึกสำเร็จ');
    } catch (err) {
      console.error(err);
    }
  }

function handleProjectChange() {
    const val = document.getElementById('projectSelect').value;
    const form = document.getElementById('researchForm');
    
    // ถ้าผู้ใช้เลือกบรรทัด "-- เลือกงานวิจัย --" (ค่าว่าง) ให้ซ่อนฟอร์มไว้ก่อน
    if (val === "") {
      form.style.display = 'none';
      return;
    }
    
    // ถ้าไม่ใช่ค่าว่าง ให้แสดงฟอร์ม
    form.style.display = 'block';
    form.reset();
    document.getElementById('ramaID_MR').value = currentUser.ramaID;
    
    if (val === 'NEW') {
      // กรณีสร้างใหม่
      document.getElementById('rowNumber').value = '';
    } else {
      // กรณีอัปเดตงานเก่า
      const proj = currentProjects[val];
      document.getElementById('rowNumber').value = proj.rowNumber;
      
      // นำข้อมูลเก่ามาใส่ในฟอร์ม (ตามโค้ดเดิมของคุณ)
      for (let key in proj) {
        let el = document.getElementById(key);
        if (el && el.tagName !== 'FILE') {
          if (el.multiple && proj[key]) {
            let values = proj[key].toString().split(',').map(s => s.trim());
            Array.from(el.options).forEach(opt => opt.selected = values.includes(opt.value));
          } else {
            el.value = proj[key];
          }
        }
      }
    }
    checkLogic(); // ประมวลผลการล็อคช่อง
  }
  
  function showError(msg) {
    document.getElementById('loadingScreen').style.display = 'none';
    const errScreen = document.getElementById('errorScreen');
    errScreen.style.display = 'block';
    errScreen.innerText = msg;
  }
</script>
</body>
</html>
