<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Rama Tracker v2.31 (Smart Dropdown + Flag)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .step-card { border-left: 4px solid #0d6efd; margin-bottom: 15px; transition: 0.3s; }
        .step-locked { opacity: 0.5; pointer-events: none; border-left: 4px solid #6c757d; background-color:#f1f3f5 !important; }
        .condition-wait { border-left: 4px solid #ffc107 !important; background-color: #fffbeb !important; }
        .tag-item { display: inline-block; background: #e9ecef; border: 1px solid #dee2e6; border-radius: 15px; padding: 2px 10px; margin: 2px; font-size: 0.85rem; }
        .tag-remove { margin-left: 5px; cursor: pointer; color: #dc3545; font-weight: bold; }
        
        /* Dashboard Styles */
        .dashboard-card { border: none; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; }
        .dashboard-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
        .role-title { font-size: 0.8rem; color: #6c757d; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
        .name-list { font-size: 0.9rem; line-height: 1.4; color: #495057; }
        .step-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px; }
        .step-box { padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background-color: #e9ecef; color: #adb5bd; border: 1px solid #dee2e6; display: flex; align-items: center; gap: 4px; }
        .step-box.done { background-color: #d1e7dd; color: #0f5132; border-color: #badbcc; }
        .step-box.done::before { content: '✔️'; }
        .step-box.pending::before { content: '⏳'; opacity: 0.5; }
        .blink-alert { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center mb-4 text-primary fw-bold">ติดตามงานวิจัยผิวหนัง รามาธิบดี 2.31</h3>

    <div id="login-section" class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
        <div class="text-center mb-3">
            <span id="login-status" class="text-warning fw-bold">กำลังเชื่อมต่อระบบ LINE...</span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">รหัสบุคลากร (Rama ID)</label>
            <input type="tel" id="login-ramaid" class="form-control form-control-lg text-center" placeholder="ระบุตัวเลข" inputmode="numeric">
        </div>
        <button id="login-btn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="login()" disabled>เข้าสู่ระบบ</button>

        <hr class="mt-4 mb-3 text-secondary">
        <div class="text-center">
            <a href="summary.html" target="_blank" class="btn btn-outline-secondary w-100 fw-bold">📈 ดูสรุปภาระงานวิจัย (Summary)</a>
        </div>
    </div>

    <div id="app-section" style="display:none;">
        <div class="alert alert-info py-2 mb-4 shadow-sm d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span>👤 <span id="display-username" class="fw-bold text-primary"></span></span>
            <div class="text-end">
                <span id="role-badge" class="badge bg-secondary shadow-sm me-2" style="display:none; font-size: 0.8rem;">ตรวจสอบสิทธิ์...</span>
                <button class="btn btn-sm btn-success fw-bold shadow-sm me-1" onclick="openDashboard()">📊 Dashboard</button>
                <button class="btn btn-sm btn-outline-primary bg-white me-1" onclick="fetchInitialData()">🔄 รีเฟรช</button>
                <button class="btn btn-sm btn-outline-danger bg-white" onclick="location.reload()">🚪 ออก</button>
            </div>
        </div>

        <div id="main-view">
            <div class="mb-3">
                <label class="form-label fw-bold">เลือกงานวิจัย (เรียงตามความสำคัญ 🚩)</label>
                <select id="research-selector" class="form-select form-select-lg border-primary shadow-sm" onchange="loadResearch(this.value)">
                    <option value="">-- กำลังโหลดข้อมูล... --</option>
                </select>
            </div>

            <form id="research-form" style="display:none;">
                <div class="card shadow-sm p-3 mb-4 border-top border-4 border-primary">
                    <h5 class="border-bottom pb-2 text-primary fw-bold">ข้อมูลทั่วไป</h5>
                    <div class="mb-2">
                        <label class="form-label fw-bold">Title (ชื่อเรื่อง) <span class="text-danger">*</span></label>
                        <input type="text" id="Title" class="form-control bg-light" required>
                        <div id="ec_reminder_section" class="mt-2" style="display:none;">
                            <div id="ec_reminder_text" class="small fw-bold"></div>
                        </div>
                        <div id="mr_name_display" class="text-success small mt-2 fw-bold" style="display:none;"></div>
                    </div>
                    
                    <div class="mb-3 mt-3">
                        <label class="form-label fw-bold text-secondary small">ทีมวิจัย (Other Research - แพทย์)</label>
                        <div id="other_research_list" class="mb-2 p-2 border rounded bg-white" style="min-height: 40px;"></div>
                        <button type="button" id="btn_add_doctor" class="btn btn-outline-primary btn-sm" onclick="openPicker('doctor')">+ เพิ่มแพทย์</button>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">Main Staff (อาจารย์ที่ปรึกษาหลัก)</label>
                        <select id="ramaID_MS" class="form-select form-select-sm" required onchange="currentData.ramaID_MS = this.value;"></select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">อาจารย์ร่วม (Other Staff)</label>
                        <div id="other_staff_list" class="mb-2 p-2 border rounded bg-white" style="min-height: 40px;"></div>
                        <button type="button" id="btn_add_staff" class="btn btn-outline-primary btn-sm" onclick="openPicker('staff')">+ เพิ่มอาจารย์</button>
                    </div>

                    <div id="draft_upload_section" class="mb-3 mt-3 p-2 bg-light border rounded">
                        <label class="fw-bold small">📄 Draft Protocol (PDF)</label>
                        <div id="input_draft_wrap">
                            <input type="file" id="file_protocol_draft" class="form-control form-control-sm" accept=".pdf" onchange="handleFileSelect('protocol_draft', this.id)">
                        </div>
                        <div id="existing_draft_link" class="mt-1" style="display:none;"></div>
                    </div>
                </div>

                <div class="card shadow-sm p-3 mb-4 border-top border-4 border-success">
                    <h5 class="border-bottom pb-2 text-success fw-bold">ความก้าวหน้า (Progress)</h5>
                    <div id="progress-container"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" id="save-btn" class="btn btn-success btn-lg w-100 fw-bold shadow" onclick="saveData()">💾 บันทึกข้อมูล</button>
                    <button type="button" class="btn btn-secondary btn-lg w-100 fw-bold" onclick="closeForm()">ปิดฟอร์ม</button>
                </div>
            </form>
        </div>

        <div id="dashboard-view" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="text-primary fw-bold mb-0">📊 ภาพรวมงานวิจัย (Dashboard)</h4>
                <button class="btn btn-outline-secondary shadow-sm" onclick="closeDashboard()">🔙 กลับไปหน้าจัดการ</button>
            </div>
            <div id="dashboard-container" class="row g-4"></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';
    const LIFF_ID = '2009730964-NicRUF0I';
    
    let currentUser = { id: '', ip: '', line_uid: '', line_displayname: '' };
    let masterData = {};
    let currentData = { other_research: [], other_staff: [] }; 
    let isViewer = false; 
    let pendingFiles = {}; 
    let currentPerms = {}; 
    
    const progressSteps = [
        { key: 'protocol_draft', label: 'Protocol Draft', role: 'MR', hasFile: 'draft_link' },
        { key: 'MS_protocol_draft', label: 'MS Protocol Draft', role: 'MS' },
        { key: 'EC_subm', label: 'EC Submission', role: 'MR' },
        { key: 'MS_EC_subm', label: 'MS EC Submission', role: 'MS' },
        { key: 'EC_correct', label: 'EC Correction', role: 'MR' },
        { key: 'MS_EC_correct', label: 'MS EC Correction', role: 'MS' },
        { key: 'EC_approve', label: 'EC Approve', role: 'MR', hasFile: 'EC_link', needsDates: true }, 
        { key: 'MS_EC_approve', label: 'MS EC Approve', role: 'MS' },
        { key: 'data_collect', label: 'Data Collect', role: 'MR' },
        { key: 'data_analysis', label: 'Data Analysis', role: 'MR' },
        { key: 'presentation', label: 'Presentation (งานประชุม/สถานที่/วันเวลา)', role: 'MR', needsText: true }, 
        { key: 'manu_draft', label: 'Manuscript Draft', role: 'MR', hasFile: 'manu_draft_link' },
        { key: 'MS_manu_draft', label: 'MS Manuscript Draft', role: 'MS' },
        { key: 'manu_submis', label: 'Manuscript Submission', role: 'MR' },
        { key: 'MS_manu_submis', label: 'MS Manuscript Submission', role: 'MS' },
        { key: 'manu_revise', label: 'Manuscript Revise', role: 'MR' },
        { key: 'MS_manu_revise', label: 'MS Manuscript Revise', role: 'MS' },
        { key: 'manu_accept', label: 'Manuscript Accept', role: 'MR', hasFile: 'Manu_link' }, 
        { key: 'MS_manu_accept', label: 'MS Final Accept', role: 'MS' }
    ];

    const dashboardSteps = [
        { key: 'protocol_draft', label: 'Protocol' },
        { key: 'EC_subm', label: 'EC Subm' },
        { key: 'EC_correct', label: 'EC Cor' },
        { key: 'EC_approve', label: 'EC Appr' },
        { key: 'data_collect', label: 'Data Col' },
        { key: 'data_analysis', label: 'Data Ana' },
        { key: 'presentation', label: 'Present' }, 
        { key: 'manu_draft', label: 'Manu Dft' },
        { key: 'manu_submis', label: 'Manu Sub' },
        { key: 'manu_revise', label: 'Manu Rev' },
        { key: 'manu_accept', label: 'Manu Acc' }
    ];

    window.onload = async () => { 
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                currentUser.line_uid = profile.userId;
                currentUser.line_displayname = profile.displayName; 
                document.getElementById('login-status').innerText = `✅ เชื่อมต่อ LINE: ${currentUser.line_displayname}`;
                document.getElementById('login-status').className = "text-success fw-bold";
            } else {
                document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน (เบราว์เซอร์)";
                document.getElementById('login-status').className = "text-primary fw-bold";
            }
        } catch (e) {
            document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน";
            document.getElementById('login-status').className = "text-secondary fw-bold";
        } finally {
            document.getElementById('login-btn').disabled = false;
        }
    };

    function isSameID(id1, id2) {
        const c1 = (id1 || '').toString().replace(/^0+/, '') || '0';
        const c2 = (id2 || '').toString().replace(/^0+/, '') || '0';
        return c1 === c2;
    }

    function getSafeData(obj, key) {
        if (!key) return null;
        if (obj[key] !== undefined && obj[key] !== "") return obj[key];
        const foundKey = Object.keys(obj).find(k => k.toLowerCase() === key.toLowerCase());
        return foundKey ? obj[foundKey] : null;
    }

    function generateECTag(expireDateStr) {
        if (!expireDateStr || expireDateStr.trim() === '') return '';
        const expireDate = new Date(expireDateStr);
        if (isNaN(expireDate.getTime())) return '';
        const today = new Date();
        today.setHours(0, 0, 0, 0); 
        expireDate.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24)); 

        if (diffDays < 0) return `<span class="badge bg-danger blink-alert shadow-sm ms-2">⚠️ EC หมดอายุแล้ว (${Math.abs(diffDays)} วัน)</span>`;
        if (diffDays <= 30) return `<span class="badge bg-danger shadow-sm ms-2">⚠️ เหลือ ${diffDays} วัน</span>`;
        if (diffDays <= 90) return `<span class="badge bg-warning text-dark shadow-sm ms-2">⏳ เหลือ ${diffDays} วัน</span>`;
        return `<span class="badge bg-success shadow-sm ms-2">✅ เหลือ ${diffDays} วัน</span>`;
    }

    function login() {
        let id = document.getElementById('login-ramaid').value.trim();
        if (!id) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ Rama ID', 'warning');
        id = id.replace(/^0+/, '') || "0"; 
        currentUser.id = id;
        fetchInitialData();
    }

    function fetchInitialData() {
        Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const safeUid = currentUser.line_uid || '';
        const safeDName = encodeURIComponent(currentUser.line_displayname || '');
        
        fetch(`${GAS_URL}?action=getInitialData&ramaID=${currentUser.id}&lineUid=${safeUid}&lineDisplayName=${safeDName}`)
            .then(res => res.json())
            .then(data => {
                if (data.requireLineLogin) {
                    Swal.fire({ title: '🔒 ยืนยันตัวตน', text: data.message, icon: 'warning', showCancelButton: true, confirmButtonText: 'ล็อกอินด้วย LINE', confirmButtonColor: '#06C755' }).then((result) => { if (result.isConfirmed) liff.login(); });
                    return; 
                }
                if(data.error) return Swal.fire('Error', data.error, 'error');
                if(data.currentUserName === "ไม่พบชื่อในระบบ") return Swal.fire('ไม่อนุญาต', 'ไม่พบรหัสนี้ในฐานข้อมูล', 'warning');
                
                document.getElementById('display-username').innerText = data.currentUserName;
                masterData = data;

                // ==========================================
                // 🌟 ระบบประเมินสถานะ 🚩 เพื่อทำ Dropdown 🌟
                // ==========================================
                data.researches.forEach(res => {
                    const dbMR = getSafeData(res, 'ramaID_MR');
                    const dbMS = getSafeData(res, 'ramaID_MS');
                    const myName = (data.currentUserName || "").trim();
                    const rawOR = getSafeData(res, 'other_research') || "";
                    const rawOS = getSafeData(res, 'other_staff') || "";

                    res.isMR = isSameID(currentUser.id, dbMR);
                    res.isMS = isSameID(currentUser.id, dbMS);
                    res.isOR = rawOR.includes(myName);
                    res.isOS = rawOS.includes(myName);

                    res.isMyActionRequired = false;

                    if (res.isMR || res.isMS) {
                        let prevOk = true;
                        for (let i = 0; i < progressSteps.length; i++) {
                            let step = progressSteps[i];
                            let val = getSafeData(res, step.key);
                            let isMyRole = (step.role === 'MR' && res.isMR) || (step.role === 'MS' && res.isMS);
                            const msEditableSteps = ['EC_approve', 'manu_draft', 'manu_accept', 'presentation'];
                            if (res.isMS && msEditableSteps.includes(step.key)) isMyRole = true;

                            if (!val) {
                                if (prevOk && isMyRole) res.isMyActionRequired = true;
                                break;
                            }
                        }
                    }
                });

                // 🌟 จัดเรียงข้อมูลใน Dropdown 🌟
                data.researches.sort((a, b) => {
                    // 1. งานที่ต้อง Action (มี 🚩) ให้อยู่บนสุด
                    if (a.isMyActionRequired && !b.isMyActionRequired) return -1;
                    if (!a.isMyActionRequired && b.isMyActionRequired) return 1;

                    // 2. งานที่เป็น MR/MS (แต่ไม่ต้อง Action) ให้อยู่ตรงกลาง
                    const aPrimary = a.isMR || a.isMS;
                    const bPrimary = b.isMR || b.isMS;
                    if (aPrimary && !bPrimary) return -1;
                    if (!aPrimary && bPrimary) return 1;

                    // 3. งานที่เป็น OR/OS จะถูกดันไปอยู่ล่างสุดโดยอัตโนมัติ
                    return 0; 
                });

                // 🌟 สร้าง HTML สำหรับ Dropdown 🌟
                let html = '<option value="">-- เลือกงานวิจัย --</option>';
                data.researches.forEach(r => {
                    const flagHtml = r.isMyActionRequired ? '🚩 ' : '';
                    const roleTag = (r.isMR || r.isMS) ? '' : ' [ผู้ร่วมวิจัย]';
                    html += `<option value="${r.rowIndex}">${flagHtml}${r.Title || 'ไม่ระบุชื่อ'} ${roleTag}</option>`;
                });
                html += `<option value="new" class="text-primary fw-bold">+ สร้างงานวิจัยใหม่</option>`;
                document.getElementById('research-selector').innerHTML = html;
                
                let msHTML = '<option value="">-- เลือกอาจารย์ที่ปรึกษา --</option>';
                data.mainStaffs.forEach(s => msHTML += `<option value="${s.id}">${s.name}</option>`);
                document.getElementById('ramaID_MS').innerHTML = msHTML;

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                Swal.close();
            }).catch(e => Swal.fire('Error', 'เชื่อมต่อล้มเหลว', 'error'));
    }

    function closeForm() {
        document.getElementById('research-form').style.display = 'none';
        document.getElementById('research-selector').value = '';
        document.getElementById('role-badge').style.display = 'none';
    }

    function openPicker(type) {
        if(isViewer) return; 
        const isDoctor = (type === 'doctor');
        const fullList = isDoctor ? masterData.doctors : masterData.otherStaffs;
        const currentField = isDoctor ? 'other_research' : 'other_staff';
        const alreadySelected = currentData[currentField] || [];
        const mrID = getSafeData(currentData, 'ramaID_MR');
        const msID = document.getElementById('ramaID_MS').value;

        const filteredList = fullList.filter(item => {
            if (isDoctor && isSameID(item.id, mrID)) return false;
            if (!isDoctor && isSameID(item.id, msID)) return false;
            return true;
        });

        let optionsHTML = `<div class="text-start" style="max-height: 300px; overflow-y: auto;">`;
        filteredList.forEach(item => {
            const checked = alreadySelected.includes(item.name) ? 'checked' : '';
            optionsHTML += `<div class="form-check mb-2"><input class="form-check-input" type="checkbox" value="${item.name}" id="chk_${item.id}" ${checked}> <label class="form-check-label" for="chk_${item.id}">${item.name}</label></div>`;
        });
        optionsHTML += `</div>`;

        Swal.fire({ title: 'เลือกรายชื่อ', html: optionsHTML, showCancelButton: true, confirmButtonText: 'ตกลง' }).then((result) => {
            if (result.isConfirmed) {
                const selected = [];
                document.querySelectorAll('.form-check-input:checked').forEach(cb => selected.push(cb.value));
                currentData[currentField] = selected;
                updateTagDisplay(type);
            }
        });
    }

    function updateTagDisplay(type) {
        const field = (type === 'doctor') ? 'other_research' : 'other_staff';
        const container = document.getElementById(field + '_list');
        const data = currentData[field] || [];
        if (data.length === 0) { container.innerHTML = '<span class="text-muted small">ยังไม่ระบุ</span>'; return; }
        container.innerHTML = data.map((name, index) => `<span class="tag-item">${name} ${!isViewer ? `<span class="tag-remove" onclick="removeTag('${type}', ${index})">×</span>` : ''}</span>`).join('');
    }

    function removeTag(type, index) {
        if(isViewer) return;
        currentData[type === 'doctor' ? 'other_research' : 'other_staff'].splice(index, 1);
        updateTagDisplay(type);
    }

    function handleFileSelect(key, inputId) {
        const input = document.getElementById(inputId);
        if (input && input.files.length > 0) {
            const reader = new FileReader();
            reader.onload = () => { pendingFiles[key] = reader.result; checkConditions(); };
            reader.readAsDataURL(input.files[0]);
        } else { delete pendingFiles[key]; checkConditions(); }
    }

    function loadResearch(val) {
        const form = document.getElementById('research-form');
        pendingFiles = {}; 
        if (!val) { closeForm(); return; }
        form.style.display = 'block';

        if (val === 'new') {
            currentData = { ramaID_MR: currentUser.id, other_research: [], other_staff: [] };
            form.reset();
            currentData.main_research = masterData.currentUserName;
            document.getElementById('mr_name_display').innerText = `👨‍⚕️ ผู้วิจัยหลัก: ${currentData.main_research}`;
            document.getElementById('mr_name_display').style.display = 'block';
            document.getElementById('Title').readOnly = false;
            document.getElementById('ramaID_MS').disabled = false;
            document.getElementById('existing_draft_link').style.display = 'none';
            document.getElementById('ec_reminder_section').style.display = 'none';
        } else {
            const res = masterData.researches.find(r => r.rowIndex == val);
            currentData = { ...res };
            const rawOR = getSafeData(res, 'other_research');
            const rawOS = getSafeData(res, 'other_staff');
            currentData.other_research = rawOR ? String(rawOR).split('\n').filter(n => n) : [];
            currentData.other_staff = rawOS ? String(rawOS).split('\n').filter(n => n) : [];
            const dbMR = getSafeData(res, 'ramaID_MR');
            const dbMS = getSafeData(res, 'ramaID_MS');
            const mrNameStr = getSafeData(res, 'main_research') || dbMR;
            
            document.getElementById('mr_name_display').innerText = `👨‍⚕️ ผู้วิจัยหลัก: ${mrNameStr}`;
            document.getElementById('mr_name_display').style.display = 'block';
            document.getElementById('Title').value = getSafeData(res, 'Title') || '';
            document.getElementById('Title').readOnly = true;
            document.getElementById('ramaID_MS').value = dbMS || '';
            document.getElementById('ramaID_MS').disabled = true;

            const safeDraftLink = getSafeData(res, 'draft_link');
            if(safeDraftLink) {
                document.getElementById('existing_draft_link').innerHTML = `<a href="${safeDraftLink}" target="_blank" class="badge bg-primary text-decoration-none p-2 mt-1">🔍 ดู Draft Protocol</a>`;
                document.getElementById('existing_draft_link').style.display = 'block';
            } else { document.getElementById('existing_draft_link').style.display = 'none'; }

            const ecExpireDate = getSafeData(currentData, 'EC_expire_date');
            const reminderSec = document.getElementById('ec_reminder_section');
            if (ecExpireDate) {
                reminderSec.style.display = 'block';
                document.getElementById('ec_reminder_text').innerHTML = `วันหมดอายุ EC: ${ecExpireDate} ${generateECTag(ecExpireDate)}`;
            } else { reminderSec.style.display = 'none'; }
        }

        const myName = (masterData.currentUserName || "").trim();
        const dbMR = getSafeData(currentData, 'ramaID_MR');
        const dbMS = getSafeData(currentData, 'ramaID_MS');
        currentPerms.isMR = isSameID(currentUser.id, dbMR);
        currentPerms.isMS = isSameID(currentUser.id, dbMS);
        currentPerms.isOS = currentData.other_staff.some(n => n.trim() === myName);
        currentPerms.isOR = currentData.other_research.some(n => n.trim() === myName);
        currentPerms.isStaffGroup = (masterData.otherStaffs || []).some(s => isSameID(s.id, currentUser.id));
        currentPerms.canViewAllFiles = currentPerms.isMR || currentPerms.isMS || currentPerms.isOS || currentPerms.isStaffGroup;
        
        isViewer = !currentPerms.isMR && !currentPerms.isMS;

        let badgeText = "Viewer"; let badgeClass = "bg-secondary";
        if (currentPerms.isMR) { badgeText = "MR"; badgeClass = "bg-success"; }
        else if (currentPerms.isMS) { badgeText = "MS"; badgeClass = "bg-primary"; }
        else if (currentPerms.isStaffGroup) { badgeText = "Staff"; badgeClass = "bg-info text-dark"; }

        const badgeEl = document.getElementById('role-badge');
        badgeEl.innerText = `🛡️ ${badgeText}`; badgeEl.className = `badge shadow-sm me-1 ${badgeClass}`; badgeEl.style.display = 'inline-block';

        document.getElementById('save-btn').style.display = isViewer ? 'none' : 'block';
        document.getElementById('btn_add_doctor').style.display = isViewer ? 'none' : 'inline-block';
        document.getElementById('btn_add_staff').style.display = isViewer ? 'none' : 'inline-block';
        document.getElementById('input_draft_wrap').style.display = isViewer ? 'none' : 'block'; 

        updateTagDisplay('doctor');
        updateTagDisplay('staff');
        renderProgress();
    }

    function renderProgress() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        let prevOk = true;
        
        progressSteps.forEach(step => {
            const val = getSafeData(currentData, step.key);
            let isMyRole = (step.role === 'MR' && currentPerms.isMR) || (step.role === 'MS' && currentPerms.isMS);
            
            const msEditableSteps = ['EC_approve', 'manu_draft', 'manu_accept', 'presentation'];
            if (currentPerms.isMS && msEditableSteps.includes(step.key)) isMyRole = true;

            let isActionLocked = (!prevOk || !isMyRole || isViewer);
            let needsCondition = false;
            if (prevOk && isMyRole && !isViewer) { if (step.hasFile || step.needsDates || step.needsText) needsCondition = true; }
            if (val && isMyRole && !isViewer) isActionLocked = false; 

            let cardStyle = 'bg-white';
            if (!val) {
                if (needsCondition) cardStyle = 'condition-wait';
                else if (isActionLocked) cardStyle = 'step-locked';
            }

            let displayBtnText = val ? `🔄 ${val}` : 'ลงเวลา';
            if (val && step.needsText) displayBtnText = '🔄 อัปเดตข้อมูล';
            const btnClass = val ? 'btn-outline-success fw-bold' : 'btn-outline-primary';

            let html = `
                <div class="card p-2 step-card mb-2 ${cardStyle} shadow-sm border border-secondary border-opacity-25">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-dark small">${step.label} <span class="badge bg-secondary">${step.role}</span></span>
                        <button type="button" id="btn_${step.key}" data-needs-check="${needsCondition}" class="btn btn-sm ${btnClass}" 
                            onclick="stamp('${step.key}')" ${isActionLocked ? 'disabled' : ''}>
                            ${displayBtnText}
                        </button>
                    </div>`;

            if(step.hasFile && step.key !== 'protocol_draft' && prevOk && isMyRole && !isViewer) {
                const fileLabel = val ? 'แนบไฟล์ใหม่ (หากต้องการเขียนทับของเดิม)' : 'แนบไฟล์ PDF';
                html += `<div class="mt-2"><label class="small text-muted fw-bold">${fileLabel}</label><input type="file" id="file_${step.key}" class="form-control form-control-sm border-secondary border-opacity-50" accept=".pdf" onchange="handleFileSelect('${step.key}', this.id)"></div>`;
            }

            const fileUrl = getSafeData(currentData, step.hasFile);
            if (val && fileUrl && (step.key === 'protocol_draft' || currentPerms.canViewAllFiles)) {
                html += `<div class="mt-2"><a href="${fileUrl}" target="_blank" class="badge bg-primary text-decoration-none p-2 shadow-sm" style="pointer-events: auto;">🔍 ดูไฟล์</a></div>`;
            }

            if (step.needsDates && prevOk) {
                const appDate = getSafeData(currentData, 'EC_approve_date') || '';
                const expDate = getSafeData(currentData, 'EC_expire_date') || '';
                if (isMyRole && !isViewer) {
                    html += `
                    <div class="mt-2 row gx-2 bg-light p-2 rounded border border-secondary border-opacity-25">
                        <div class="col-6"><label class="small fw-bold">วันที่อนุมัติ</label><input type="date" id="date_${step.key}" class="form-control form-control-sm" value="${appDate}" onchange="checkConditions()"></div>
                        <div class="col-6"><label class="small fw-bold">วันหมดอายุ</label><input type="date" id="expire_${step.key}" class="form-control form-control-sm" value="${expDate}" onchange="checkConditions()"></div>
                    </div>`;
                } else if (val) {
                    html += `<div class="mt-2 small text-success">📅 อนุมัติ: ${appDate} | หมดอายุ: ${expDate}</div>`;
                }
            }

            if (step.needsText && prevOk) {
                if (isMyRole && !isViewer) {
                    html += `<div class="mt-2"><label class="small fw-bold">งานประชุม/สถานที่/วันเวลา</label><input type="text" id="text_${step.key}" class="form-control form-control-sm border-secondary border-opacity-50" placeholder="กรอกข้อมูล..." value="${val || ''}" oninput="checkConditions()"></div>`;
                } else if (val) {
                    html += `<div class="mt-2 small text-success">📝 ข้อมูล: <span class="text-dark">${val}</span></div>`;
                }
            }

            html += `</div>`;
            container.innerHTML += html;
            if (!val) prevOk = false; 
        });
        checkConditions();
    }

    function checkConditions() {
        if (isViewer) return;
        progressSteps.forEach(step => {
            const btn = document.getElementById(`btn_${step.key}`);
            if (btn && btn.getAttribute('data-needs-check') === 'true') {
                let locked = false;
                if (step.hasFile) {
                    const hasNew = !!pendingFiles[step.key];
                    const hasOld = getSafeData(currentData, step.hasFile);
                    if (!hasNew && !hasOld) locked = true;
                }
                if (step.needsDates) {
                    const d1 = document.getElementById(`date_${step.key}`);
                    const d2 = document.getElementById(`expire_${step.key}`);
                    if (!d1?.value || !d2?.value) locked = true;
                }
                if (step.needsText) {
                    const txt = document.getElementById(`text_${step.key}`);
                    if (!txt?.value.trim()) locked = true;
                }
                btn.disabled = locked;
            }
        });
    }

    function stamp(key) {
        if(isViewer) return;
        const step = progressSteps.find(s => s.key === key);
        const oldVal = getSafeData(currentData, key);

        const updateTimeSteps = ['protocol_draft', 'EC_approve', 'manu_draft', 'manu_accept'];

        if(key === 'EC_approve') {
            currentData['EC_approve_date'] = document.getElementById(`date_${key}`).value;
            currentData['EC_expire_date'] = document.getElementById(`expire_${key}`).value;
        }

        if(step.needsText) {
            currentData[key] = document.getElementById(`text_${key}`).value;
        } else {
            if (oldVal && !updateTimeSteps.includes(key)) {
                // คงเวลาเดิมไว้
            } else {
                currentData[key] = new Date().toLocaleString('th-TH');
            }
        }
        renderProgress(); 
    }

    async function saveData() {
        if(isViewer) return; 
        try {
            const titleInput = document.getElementById('Title').value.trim();
            if (!titleInput) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ Title', 'warning');

            progressSteps.forEach(step => {
                if (step.needsDates && getSafeData(currentData, step.key)) {
                    currentData['EC_approve_date'] = document.getElementById(`date_${step.key}`).value;
                    currentData['EC_expire_date'] = document.getElementById(`expire_${step.key}`).value;
                }
                if (step.needsText && getSafeData(currentData, step.key)) {
                    currentData[step.key] = document.getElementById(`text_${step.key}`).value;
                }
            });

            Swal.fire({ title: 'กำลังบันทึก...', text: 'โปรดรอสักครู่', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const payload = { ...currentData };
            payload.Title = titleInput;
            payload.ramaID_MS = document.getElementById('ramaID_MS').value;
            payload.main_staff = document.getElementById('ramaID_MS').options[document.getElementById('ramaID_MS').selectedIndex]?.text;
            payload.other_research = currentData.other_research.join('\n');
            payload.other_staff = currentData.other_staff.join('\n');
            payload.draftLinkBase64 = pendingFiles['protocol_draft'] || null;
            payload.ecLinkBase64 = pendingFiles['EC_approve'] || null;
            payload.manuDraftBase64 = pendingFiles['manu_draft'] || null;
            payload.manuLinkBase64 = pendingFiles['manu_accept'] || null;

            const resp = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'saveResearch', payload: payload }) });
            const res = await resp.json();
            if (res.status === 'success') {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success').then(() => fetchInitialData());
            }
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    }

    // ==========================================
    // 📊 Dashboard Logic (Synchronized Sort)
    // ==========================================
    function formatList(rawString) {
        if (!rawString) return '<span class="text-muted small">-</span>';
        return rawString.toString().split('\n').filter(n => n.trim() !== '').join('<br>');
    }

    function openDashboard() { document.getElementById('main-view').style.display = 'none'; document.getElementById('dashboard-view').style.display = 'block'; loadDashboardData(); }
    function closeDashboard() { document.getElementById('dashboard-view').style.display = 'none'; document.getElementById('main-view').style.display = 'block'; }
    
    function loadDashboardData() {
        const container = document.getElementById('dashboard-container');
        container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">กำลังโหลดและตรวจสอบสถานะการทำงาน...</p></div>';
        
        fetch(`${GAS_URL}?action=getAllResearch`).then(res => res.json()).then(data => {
            container.innerHTML = '';
            let active = data.researches.filter(res => getSafeData(res, 'MS_manu_accept') === "");
            if (active.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-success py-5"><h5>🎉 ไม่มีงานวิจัยที่อยู่ระหว่างดำเนินการ</h5></div>';
                return;
            }

            active.forEach(res => {
                let score = 0; dashboardSteps.forEach(s => { if(getSafeData(res, s.key)) score++; });
                res.score = score;

                const dbMR = getSafeData(res, 'ramaID_MR');
                const dbMS = getSafeData(res, 'ramaID_MS');
                const myName = (masterData.currentUserName || "").trim();
                const rawOR = getSafeData(res, 'other_research') || "";
                const rawOS = getSafeData(res, 'other_staff') || "";

                const isMR = isSameID(currentUser.id, dbMR);
                const isMS = isSameID(currentUser.id, dbMS);
                const isOR = rawOR.includes(myName);
                const isOS = rawOS.includes(myName);

                res.isMyActionRequired = false;
                res.actionableLabel = "";
                res.isPrimaryRole = isMR || isMS;

                if (res.isPrimaryRole) {
                    let prevOk = true;
                    for (let i = 0; i < progressSteps.length; i++) {
                        let step = progressSteps[i];
                        let val = getSafeData(res, step.key);
                        let isMyRole = (step.role === 'MR' && isMR) || (step.role === 'MS' && isMS);
                        const msEditableSteps = ['EC_approve', 'manu_draft', 'manu_accept', 'presentation'];
                        if (isMS && msEditableSteps.includes(step.key)) isMyRole = true;

                        if (!val) {
                            if (prevOk && isMyRole) {
                                res.isMyActionRequired = true;
                                res.actionableLabel = step.label;
                            }
                            break;
                        }
                    }
                }
            });

            // 🌟 จัดเรียง Dashboard เหมือนกับ Dropdown เป๊ะ 🌟
            active.sort((a,b) => {
                // 1. Action Required
                if (a.isMyActionRequired && !b.isMyActionRequired) return -1;
                if (!a.isMyActionRequired && b.isMyActionRequired) return 1;
                
                // 2. บทบาท MR/MS (ไม่มี Action ก็ให้อยู่เหนือ OR/OS)
                if (a.isPrimaryRole && !b.isPrimaryRole) return -1;
                if (!a.isPrimaryRole && b.isPrimaryRole) return 1;

                // 3. เรียงตามความคืบหน้า
                return b.score - a.score;
            });

            active.forEach(res => {
                const title = getSafeData(res, 'Title') || 'ไม่ได้ระบุชื่อเรื่อง';
                const mrName = getSafeData(res, 'main_research') || getSafeData(res, 'ramaID_MR') || '-';
                const msName = getSafeData(res, 'main_staff') || getSafeData(res, 'ramaID_MS') || '-';
                const orList = formatList(getSafeData(res, 'other_research'));
                const osList = formatList(getSafeData(res, 'other_staff'));
                const ecTag = generateECTag(getSafeData(res, 'EC_expire_date'));
                const percentComplete = Math.round((res.score / dashboardSteps.length) * 100);

                let steps = ''; 
                dashboardSteps.forEach(s => { 
                    const isDone = getSafeData(res, s.key) !== "";
                    steps += `<div class="step-box ${isDone ? 'done' : 'pending'}">${s.label}</div>`;
                });

                // 🌟 แทรก 🚩 สำหรับ Dashboard
                const actionBadge = res.isMyActionRequired ? `<span class="badge bg-danger blink-alert shadow-sm mt-2" style="font-size: 0.85rem;">🚩 รอคุณดำเนินการ: ${res.actionableLabel}</span>` : '';
                const borderClass = res.isMyActionRequired ? 'border-danger' : 'border-primary';

                container.innerHTML += `
                <div class="col-md-6 col-lg-12">
                    <div class="card dashboard-card shadow-sm h-100 border-start border-4 ${borderClass}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start border-bottom pb-2 mb-3">
                                <div>
                                    <h5 class="card-title text-dark fw-bold mb-0">${res.isMyActionRequired ? '🚩 ' : ''}📄 ${title} ${ecTag}</h5>
                                    ${actionBadge}
                                </div>
                                <span class="badge bg-primary rounded-pill shadow-sm" style="font-size: 0.85rem;">คืบหน้า ${percentComplete}%</span>
                            </div>

                            <div class="row gx-4 gy-3">
                                <div class="col-sm-6">
                                    <div class="p-3 bg-light rounded border h-100">
                                        <div class="mb-2"><div class="role-title">ผู้วิจัยหลัก (Main Research)</div><span class="badge bg-primary text-white" style="font-size:0.9rem;">${mrName}</span></div>
                                        <div><div class="role-title">แพทย์ร่วม (Other Research)</div><div class="name-list mt-1">${orList}</div></div>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="p-3 bg-light rounded border h-100">
                                        <div class="mb-2"><div class="role-title">อ.ที่ปรึกษาหลัก (Main Staff)</div><span class="badge bg-success text-white" style="font-size:0.9rem;">${msName}</span></div>
                                        <div><div class="role-title">อาจารย์ร่วม (Other Staff)</div><div class="name-list mt-1">${osList}</div></div>
                                    </div>
                                </div>
                            </div>
                            <div class="step-container mt-3 pt-3 border-top">${steps}</div>
                        </div>
                    </div>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
