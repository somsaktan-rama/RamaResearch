<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Rama Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; }
        .step-card { border-left: 4px solid #0d6efd; margin-bottom: 15px; }
        .step-locked { opacity: 0.5; pointer-events: none; border-left: 4px solid #6c757d; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center mb-4 text-primary">ติดตามงานวิจัยผิวหนัง รามาธิบดี 1.03</h3>

    <div id="login-section" class="card shadow-sm p-4">
        <div class="text-center mb-3">
            <span id="login-status" class="text-warning fw-bold">กำลังเตรียมความพร้อมระบบ...</span>
        </div>
        <div class="mb-3">
            <label class="form-label">Rama ID (สำหรับการทดสอบ)</label>
            <input type="text" id="login-ramaid" class="form-control" placeholder="ระบุ Rama ID ของคุณ">
        </div>
        <button id="login-btn" class="btn btn-primary w-100" onclick="login()" disabled>เข้าสู่ระบบ</button>
    </div>

    <div id="app-section" style="display:none;">
        <div class="alert alert-info py-2 mb-3">
            👤 ผู้ใช้งาน: <span id="display-username" class="fw-bold"></span>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">เลือกงานวิจัย</label>
            <select id="research-selector" class="form-select" onchange="loadResearch(this.value)">
                <option value="">-- กรุณาเลือก --</option>
                <option value="new">+ สร้างงานวิจัยใหม่</option>
            </select>
        </div>

        <form id="research-form" style="display:none;">
            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2">ข้อมูลทั่วไป</h5>
                <div class="mb-2">
                    <label>Title</label>
                    <input type="text" id="Title" class="form-control" required>
                </div>
                <div class="mb-2">
                    <label>Main Research (MR)</label>
                    <input type="text" id="ramaID_MR" class="form-control" readonly>
                </div>
<div class="mb-2">
    <label>Other Research (แพทย์ - เลือกได้หลายคน)</label>
    <select id="other_research" class="form-select" multiple style="min-height: 120px;"></select>
    <small class="text-muted">PC: กด Ctrl ค้างเพื่อเลือกหลายคน</small>
</div>
                <div class="mb-2">
                    <label>Main Staff (MS - อาจารย์ประจำ)</label>
                    <select id="ramaID_MS" class="form-select" required></select>
                </div>
<div class="mb-2">
    <label>Other Staff (อาจารย์ - เลือกได้หลายคน)</label>
    <select id="other_staff" class="form-select" multiple style="min-height: 120px;"></select>
</div>
                <div class="mb-2">
                    <label>แนบไฟล์ Draft (PDF)</label>
                    <input type="file" id="draft_link_file" class="form-control" accept=".pdf">
                </div>
            </div>

            <div class="card shadow-sm p-3 mb-4">
                <h5 class="border-bottom pb-2">ความก้าวหน้า (Progress)</h5>
                <div id="progress-container"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-success w-100" onclick="saveData()">💾 บันทึกข้อมูล</button>
                <button type="button" class="btn btn-danger w-100" onclick="location.reload()">ยกเลิก</button>
            </div>
        </form>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';
    let currentUser = { id: '', role: '', ip: '' };
    let currentData = {};

// เก็บข้อมูลที่โหลดมาจาก Server
let masterData = {}; 

function populateDropdowns(data) {
    masterData = data;
    const selector = document.getElementById('research-selector');
    
    selector.innerHTML = '<option value="">-- กรุณาเลือก --</option><option value="new">+ สร้างงานวิจัยใหม่</option>';
    data.researches.forEach(res => {
        let opt = document.createElement('option');
        opt.value = res.rowIndex; 
        opt.textContent = res.Title || "งานวิจัยไม่มีชื่อ (แถวที่ " + res.rowIndex + ")";
        selector.appendChild(opt);
    });

    // --- Main Staff ---
    const msSelect = document.getElementById('ramaID_MS');
    msSelect.innerHTML = '<option value="">-- เลือกอาจารย์ที่ปรึกษาหลัก --</option>';
    if(data.mainStaffs.length === 0) {
        msSelect.innerHTML += '<option disabled>⚠️ ไม่พบข้อมูลอาจารย์ในระบบ</option>';
    } else {
        data.mainStaffs.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.id; opt.textContent = s.name;
            msSelect.appendChild(opt);
        });
    }

    // --- Other Research ---
    const otherResSelect = document.getElementById('other_research');
    otherResSelect.innerHTML = ''; 
    if(data.doctors.length === 0) {
        let opt = document.createElement('option');
        opt.textContent = '⚠️ ไม่พบข้อมูลแพทย์ในระบบ'; opt.disabled = true;
        otherResSelect.appendChild(opt);
    } else {
        data.doctors.forEach(d => {
            let opt = document.createElement('option');
            opt.value = d.id; opt.textContent = d.name;
            otherResSelect.appendChild(opt);
        });
    }

    // --- Other Staff ---
    const otherStaffSelect = document.getElementById('other_staff');
    otherStaffSelect.innerHTML = ''; 
    if(data.otherStaffs.length === 0) {
        let opt = document.createElement('option');
        opt.textContent = '⚠️ ไม่พบข้อมูลอาจารย์ในระบบ'; opt.disabled = true;
        otherStaffSelect.appendChild(opt);
    } else {
        data.otherStaffs.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s.id; opt.textContent = s.name;
            otherStaffSelect.appendChild(opt);
        });
    }
}

    function loadResearch(val) {
    const form = document.getElementById('research-form');
    if (!val) {
        form.style.display = 'none';
        return;
    }

    form.style.display = 'block';
    
    if (val === 'new') {
        // กรณีสร้างใหม่: เคลียร์ค่าว่าง
        currentData = { ramaID_MR: currentUser.id };
        document.getElementById('research-form').reset();
        document.getElementById('ramaID_MR').value = currentUser.id;
        document.getElementById('Title').readOnly = false;
    } else {
        // กรณีโหลดงานเก่า
        currentData = masterData.researches.find(r => r.rowIndex == val);
        document.getElementById('Title').value = currentData.Title;
        document.getElementById('Title').readOnly = true; // งานเก่าห้ามแก้ชื่อเรื่อง (ถ้าต้องการ)
        document.getElementById('ramaID_MR').value = currentData.ramaID_MR;
        document.getElementById('ramaID_MS').value = currentData.ramaID_MS;
        // ... set ค่าอื่นๆ ตามช่องที่มี
    }
    renderProgress();
}
    
    // ลำดับขั้นตอนการอนุมัติ
    const progressSteps = [
        { key: 'protocol_draft', label: 'Protocol Draft', role: 'MR' },
        { key: 'MS_protocol_draft', label: 'MS Protocol Draft', role: 'MS' },
        { key: 'EC_subm', label: 'EC Submission', role: 'MR' },
        { key: 'MS_EC_subm', label: 'MS EC Submission', role: 'MS' },
        { key: 'EC_correct', label: 'EC Correction', role: 'MR' },
        { key: 'MS_EC_correct', label: 'MS EC Correction', role: 'MS' },
        { key: 'EC_approve', label: 'EC Approve', role: 'MR', hasDates: true, hasFile: 'EC_link' },
        { key: 'MS_EC_approve', label: 'MS EC Approve', role: 'MS' },
        { key: 'data_collect', label: 'Data Collect', role: 'MR' },
        { key: 'data_analysis', label: 'Data Analysis', role: 'MR' },
        { key: 'manu_draft', label: 'Manuscript Draft', role: 'MR' },
        { key: 'MS_manu_draft', label: 'MS Manuscript Draft', role: 'MS' },
        { key: 'manu_submis', label: 'Manuscript Submission', role: 'MR' },
        { key: 'MS_manu_submis', label: 'MS Manuscript Submission', role: 'MS' },
        { key: 'manu_revise', label: 'Manuscript Revise', role: 'MR' },
        { key: 'MS_manu_revise', label: 'MS Manuscript Revise', role: 'MS' },
        { key: 'manu_accept', label: 'Manuscript Accept', role: 'MR', hasFile: 'Manu_link' },
        { key: 'presentation', label: 'Presentation', role: 'MR' },
        { key: 'MS_manu_accept', label: 'MS Final Accept', role: 'MS' }
    ];

    // หน่วงเวลาเตรียมระบบและดึง IP หากใช้ PC
    window.onload = async function() {
        if (!navigator.userAgent.includes("LINE")) {
            try {
                let response = await fetch('https://api.ipify.org?format=json');
                let data = await response.json();
                currentUser.ip = data.ip; 
            } catch(e) { console.log("IP fetch failed"); }
            enableLogin();
        } else {
            // จำลอง Delay สำหรับ LINE LIFF 
            setTimeout(() => { enableLogin(); }, 1500);
        }
    };

    function enableLogin() {
        document.getElementById('login-status').innerText = "✅ พร้อมใช้งาน" + (currentUser.ip ? ` (IP: ${currentUser.ip})` : "");
        document.getElementById('login-status').className = "text-success fw-bold";
        document.getElementById('login-btn').disabled = false;
    }

    function login() {
        const id = document.getElementById('login-ramaid').value;
        if (!id) return Swal.fire('แจ้งเตือน', 'กรุณาระบุ Rama ID', 'warning');
        currentUser.id = id;
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        fetchInitialData();
    }

function fetchInitialData() {
        Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        fetch(`${GAS_URL}?action=getInitialData&ramaID=${currentUser.id}`)
            .then(res => res.json())
            .then(data => {
                
                // 🛑 เพิ่มบรรทัดนี้เพื่อแอบดูข้อมูลหลังบ้าน!
                console.log("ข้อมูลที่ดึงมาได้:", data); 

                document.getElementById('display-username').innerText = data.currentUserName;
                populateDropdowns(data);
                Swal.close();
            }).catch(() => Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error'));
    }

    // ฟังก์ชันช่วยดึงค่าจากช่องที่เลือกได้หลายคน (Multiple Select)
    function getMultiValues(selectId) {
        const select = document.getElementById(selectId);
        return Array.from(select.selectedOptions).map(opt => opt.value).join(', ');
    }

    // ฟังก์ชันที่หายไป: จัดการข้อมูลก่อนส่งบันทึก
    async function saveData() {
        Swal.fire({ title: 'กำลังบันทึกข้อมูลและอัปโหลดไฟล์...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        // อัปเดตข้อมูลจาก Form ลง Object
        currentData.Title = document.getElementById('Title').value;
        
        const msSelect = document.getElementById('ramaID_MS');
        currentData.ramaID_MS = msSelect.value;
        currentData.main_staff = msSelect.options[msSelect.selectedIndex]?.text; // เก็บชื่ออาจารย์ด้วย
        
        // ดึงค่าหลายรายการ
        currentData.other_research = getMultiValues('other_research');
        currentData.other_staff = getMultiValues('other_staff');

        // ฟังก์ชันช่วยแปลงไฟล์ PDF เป็น Base64
        const fileToBase64 = (fileInputId) => new Promise((resolve, reject) => {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput || fileInput.files.length === 0) return resolve(null);
            
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        try {
            // อ่านไฟล์ทั้งหมด (ถ้าระบุไฟล์ไว้)
            currentData.draftLinkBase64 = await fileToBase64('draft_link_file');
            currentData.ecLinkBase64 = await fileToBase64('file_EC_approve'); // อ้างอิง ID จาก progress render
            currentData.manuLinkBase64 = await fileToBase64('file_manu_accept'); // อ้างอิง ID จาก progress render

            // ส่งข้อมูลไปยัง GAS
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: 'saveResearch',
                    payload: currentData
                })
            });

            const result = await response.json();
            
            if (result.status === 'success') {
                Swal.fire('สำเร็จ', result.message, 'success').then(() => location.reload());
            } else {
                Swal.fire('เกิดข้อผิดพลาด', 'บันทึกไม่สำเร็จ', 'error');
            }

        } catch (error) {
            console.error(error);
            Swal.fire('ข้อผิดพลาด', 'การเชื่อมต่อขัดข้อง หรือขนาดไฟล์ใหญ่เกินไป', 'error');
        }
    }

    function populateDropdowns(data) {
        // ... (โค้ดจัดการนำ data.doctors, data.mainStaffs ไปใส่ใน <select>)
        // รายละเอียดการยัดข้อมูลลง Dropdown และสร้างรายการ Progress
    }

    // ฟังก์ชันสร้าง UI สำหรับ Progress แบบเช็คคิว
    function renderProgress() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        
        let previousFilled = true; // ควบคุมไม่ให้ข้ามช่อง
        
        progressSteps.forEach((step, index) => {
            const isFilled = currentData[step.key] ? true : false;
            const isMyRole = (step.role === 'MR' && currentUser.id == currentData.ramaID_MR) || 
                             (step.role === 'MS' && currentUser.id == currentData.ramaID_MS);
            
            const lockedClass = (!previousFilled || !isMyRole) ? 'step-locked' : '';
            
            let html = `
            <div class="card p-2 step-card ${lockedClass}">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold">${step.label} (${step.role})</span>
                    <button type="button" class="btn btn-sm ${isFilled ? 'btn-success' : 'btn-outline-primary'}"
                        onclick="stampTime('${step.key}')" ${!previousFilled || !isMyRole ? 'disabled' : ''}>
                        ${isFilled ? currentData[step.key] : 'กดเพื่อลงเวลา'}
                    </button>
                </div>
            `;
            
            // เพิ่มช่องอัปโหลด PDF ถ้าถึงสเต็ปที่กำหนด
            if(step.hasFile && previousFilled && isMyRole && !isFilled) {
                html += `<input type="file" id="file_${step.key}" class="form-control form-control-sm mt-2" accept=".pdf">`;
            }
            
            html += `</div>`;
            container.innerHTML += html;
            
            if (!isFilled) previousFilled = false; // ถ้าสเต็ปนี้ยังไม่ทำ สเต็ปต่อไปจะถูกล็อค
        });
    }

    function stampTime(key) {
        const now = new Date().toLocaleString('th-TH');
        currentData[key] = now;
        renderProgress(); // Re-render เพื่อปลดล็อคข้อต่อไป
    }

    async function saveData() {
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        // ... รวบรวมข้อมูลจาก Form, อ่านไฟล์ PDF เป็น Base64, แล้วส่ง POST ไปยัง GAS
    }
</script>
</body>
</html>
