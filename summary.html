<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .summary-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .table th { background-color: #f8f9fa; text-align: center; vertical-align: middle; font-size: 0.9rem; }
        .table td { text-align: center; vertical-align: middle; }
        .text-start { text-align: left !important; }
        .badge-count { font-size: 0.9rem; width: 35px; display: inline-block; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary fw-bold mb-0">📈 สรุปภาระงานวิจัย (Summary)</h3>
        <div>
            <button class="btn btn-outline-primary shadow-sm me-2" onclick="loadSummary()">🔄 รีเฟรชข้อมูล</button>
            <button class="btn btn-primary shadow-sm" onclick="window.print()">🖨️ พิมพ์รายงาน</button>
        </div>
    </div>

    <div id="loading-spinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">กำลังคำนวณข้อมูล...</p>
    </div>

    <div id="summary-content" style="display: none;">
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card summary-card h-100 border-top border-4 border-primary">
                    <div class="card-body p-0">
                        <h5 class="card-title p-3 m-0 bg-white fw-bold text-primary border-bottom">👨‍⚕️ สรุปภาระงาน: ทีมแพทย์ (MR/OR)</h5>
                        <div class="table-responsive">
                            <table class="table table-hover table-striped m-0">
                                <thead>
                                    <tr>
                                        <th class="text-start ps-3">รายชื่อแพทย์</th>
                                        <th>ผู้วิจัยหลัก<br><small class="text-muted">(Main Research)</small></th>
                                        <th>แพทย์ร่วม<br><small class="text-muted">(Other Research)</small></th>
                                        <th class="bg-light">รวมทั้งหมด</th>
                                    </tr>
                                </thead>
                                <tbody id="doctor-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card summary-card h-100 border-top border-4 border-success">
                    <div class="card-body p-0">
                        <h5 class="card-title p-3 m-0 bg-white fw-bold text-success border-bottom">👨‍🏫 สรุปภาระงาน: ทีมอาจารย์ (MS/OS)</h5>
                        <div class="table-responsive">
                            <table class="table table-hover table-striped m-0">
                                <thead>
                                    <tr>
                                        <th class="text-start ps-3">รายชื่ออาจารย์</th>
                                        <th>ที่ปรึกษาหลัก<br><small class="text-muted">(Main Staff)</small></th>
                                        <th>อาจารย์ร่วม<br><small class="text-muted">(Other Staff)</small></th>
                                        <th class="bg-light">รวมทั้งหมด</th>
                                    </tr>
                                </thead>
                                <tbody id="staff-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🚨 ใส่ URL ของ Google Apps Script ของคุณตรงนี้
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';

    window.onload = () => { loadSummary(); };

    function loadSummary() {
        document.getElementById('summary-content').style.display = 'none';
        document.getElementById('loading-spinner').style.display = 'block';

        fetch(`${GAS_URL}?action=getAllResearch`)
            .then(res => res.json())
            .then(data => {
                if(data.error) return Swal.fire('Error', data.error, 'error');

                // 1. เตรียม Object สำหรับนับคะแนน
                let doctorStats = {};
                let staffStats = {};

                // เอาชื่อจากฐานข้อมูล Staff มาตั้งเป็นแกนหลักก่อน (เพื่อโชว์คนที่เป็น 0 ด้วย)
                (data.doctors || []).forEach(name => doctorStats[name] = { main: 0, other: 0, total: 0 });
                (data.staffs || []).forEach(name => staffStats[name] = { main: 0, other: 0, total: 0 });

                // 2. เริ่มนับคะแนนจากงานวิจัยทั้งหมด
                data.researches.forEach(res => {
                    // นับฝั่ง Main Research (MR)
                    let mr = (res.main_research || "").trim();
                    if (mr) {
                        if (!doctorStats[mr]) doctorStats[mr] = { main: 0, other: 0, total: 0 };
                        doctorStats[mr].main++;
                        doctorStats[mr].total++;
                    }

                    // นับฝั่ง Other Research (OR)
                    let ors = (res.other_research || "").split('\n').map(n => n.trim()).filter(n => n);
                    ors.forEach(or => {
                        if (!doctorStats[or]) doctorStats[or] = { main: 0, other: 0, total: 0 };
                        doctorStats[or].other++;
                        doctorStats[or].total++;
                    });

                    // นับฝั่ง Main Staff (MS)
                    let ms = (res.main_staff || "").trim();
                    if (ms) {
                        if (!staffStats[ms]) staffStats[ms] = { main: 0, other: 0, total: 0 };
                        staffStats[ms].main++;
                        staffStats[ms].total++;
                    }

                    // นับฝั่ง Other Staff (OS)
                    let oss = (res.other_staff || "").split('\n').map(n => n.trim()).filter(n => n);
                    oss.forEach(os => {
                        if (!staffStats[os]) staffStats[os] = { main: 0, other: 0, total: 0 };
                        staffStats[os].other++;
                        staffStats[os].total++;
                    });
                });

                // 3. จัดเรียงข้อมูล (คนที่งานรวมเยอะสุดอยู่บนสุด)
                const sortedDoctors = Object.entries(doctorStats).sort((a, b) => b[1].total - a[1].total);
                const sortedStaffs = Object.entries(staffStats).sort((a, b) => b[1].total - a[1].total);

                // 4. วาดตารางแพทย์ (Doctor)
                let docHtml = '';
                let totalMr = 0, totalOr = 0, totalDocAll = 0;
                sortedDoctors.forEach(([name, stat]) => {
                    totalMr += stat.main; totalOr += stat.other; totalDocAll += stat.total;
                    docHtml += `
                        <tr>
                            <td class="text-start ps-3 fw-bold text-dark">${name}</td>
                            <td><span class="badge ${stat.main > 0 ? 'bg-primary' : 'bg-secondary opacity-50'} badge-count">${stat.main}</span></td>
                            <td><span class="badge ${stat.other > 0 ? 'bg-info text-dark' : 'bg-secondary opacity-50'} badge-count">${stat.other}</span></td>
                            <td class="bg-light fw-bold">${stat.total}</td>
                        </tr>`;
                });
                // แถวสรุปผลรวมด้านล่างสุด
                docHtml += `
                    <tr class="table-primary fw-bold">
                        <td class="text-end pe-3">รวมทั้งหมด</td>
                        <td>${totalMr}</td>
                        <td>${totalOr}</td>
                        <td>${totalDocAll}</td>
                    </tr>`;
                document.getElementById('doctor-tbody').innerHTML = docHtml;

                // 5. วาดตารางอาจารย์ (Staff)
                let staffHtml = '';
                let totalMs = 0, totalOs = 0, totalStaffAll = 0;
                sortedStaffs.forEach(([name, stat]) => {
                    totalMs += stat.main; totalOs += stat.other; totalStaffAll += stat.total;
                    staffHtml += `
                        <tr>
                            <td class="text-start ps-3 fw-bold text-dark">${name}</td>
                            <td><span class="badge ${stat.main > 0 ? 'bg-success' : 'bg-secondary opacity-50'} badge-count">${stat.main}</span></td>
                            <td><span class="badge ${stat.other > 0 ? 'bg-warning text-dark' : 'bg-secondary opacity-50'} badge-count">${stat.other}</span></td>
                            <td class="bg-light fw-bold">${stat.total}</td>
                        </tr>`;
                });
                // แถวสรุปผลรวมด้านล่างสุด
                staffHtml += `
                    <tr class="table-success fw-bold">
                        <td class="text-end pe-3">รวมทั้งหมด</td>
                        <td>${totalMs}</td>
                        <td>${totalOs}</td>
                        <td>${totalStaffAll}</td>
                    </tr>`;
                document.getElementById('staff-tbody').innerHTML = staffHtml;

                // สลับหน้าจอมาแสดงผล
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('summary-content').style.display = 'block';

            }).catch(e => {
                document.getElementById('loading-spinner').innerHTML = `<div class="text-danger py-5">เกิดข้อผิดพลาดในการคำนวณข้อมูล: ${e.message}</div>`;
            });
    }
</script>
</body>
</html>
