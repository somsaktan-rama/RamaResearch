<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Summary with Group</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .summary-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .table th { background-color: #f8f9fa; text-align: center; vertical-align: middle; font-size: 0.85rem; }
        .table td { text-align: center; vertical-align: middle; font-size: 0.9rem; }
        .text-start { text-align: left !important; }
        .badge-count { font-size: 0.85rem; width: 30px; display: inline-block; }
        .group-text { font-size: 0.75rem; color: #6c757d; font-weight: normal; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary fw-bold mb-0">📈 สรุปงานวิจัยหน่วยโรคผิวหนัง </h3>
        <div>
            <button class="btn btn-outline-primary shadow-sm me-2" onclick="loadSummary()">🔄 รีเฟรชข้อมูล</button>
            <button class="btn btn-primary shadow-sm" onclick="window.print()">🖨️ พิมพ์รายงาน</button>
        </div>
    </div>

    <div id="loading-spinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">กำลังคำนวณและจัดเรียงข้อมูล...</p>
    </div>

    <div id="summary-content" style="display: none;">
        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card summary-card h-100 border-top border-4 border-primary">
                    <div class="card-body p-0">
                        <h5 class="card-title p-3 m-0 bg-white fw-bold text-primary border-bottom">👨‍⚕️ ทีมแพทย์ (MR/OR)</h5>
                        <div class="table-responsive">
                            <table class="table table-hover table-striped m-0">
                                <thead>
                                    <tr>
                                        <th class="text-start ps-3">รายชื่อ / กลุ่ม</th>
                                        <th>Main</th>
                                        <th>Other</th>
                                        <th class="bg-light">รวม</th>
                                    </tr>
                                </thead>
                                <tbody id="doctor-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card summary-card h-100 border-top border-4 border-success">
                    <div class="card-body p-0">
                        <h5 class="card-title p-3 m-0 bg-white fw-bold text-success border-bottom">👨‍🏫 ทีมอาจารย์ (MS/OS)</h5>
                        <div class="table-responsive">
                            <table class="table table-hover table-striped m-0">
                                <thead>
                                    <tr>
                                        <th class="text-start ps-3">รายชื่อ / กลุ่ม</th>
                                        <th>Main</th>
                                        <th>Other</th>
                                        <th class="bg-light">รวม</th>
                                    </tr>
                                </thead>
                                <tbody id="staff-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyPuWxqyYQ7ulh0Dyb-fgc29FbtYfoSHtu9MgN-Rih9PKKshHDuiDncC6qZJe6OoGU/exec';

    window.onload = () => { loadSummary(); };

    function loadSummary() {
        document.getElementById('summary-content').style.display = 'none';
        document.getElementById('loading-spinner').style.display = 'block';

        fetch(`${GAS_URL}?action=getAllResearch`)
            .then(res => res.json())
            .then(data => {
                if(data.error) return Swal.fire('Error', data.error, 'error');

                let doctorStats = {};
                let staffStats = {};

                // เอาชื่อและกลุ่มมาตั้งต้น
                (data.doctors || []).forEach(p => doctorStats[p.name] = { group: p.group, main: 0, other: 0, total: 0 });
                (data.staffs || []).forEach(p => staffStats[p.name] = { group: p.group, main: 0, other: 0, total: 0 });

                // นับคะแนน
                data.researches.forEach(res => {
                    let mr = (res.main_research || "").trim();
                    if (mr && doctorStats[mr]) { doctorStats[mr].main++; doctorStats[mr].total++; }

                    let ors = (res.other_research || "").split('\n').map(n => n.trim()).filter(n => n);
                    ors.forEach(or => { if (doctorStats[or]) { doctorStats[or].other++; doctorStats[or].total++; } });

                    let ms = (res.main_staff || "").trim();
                    if (ms && staffStats[ms]) { staffStats[ms].main++; staffStats[ms].total++; }

                    let oss = (res.other_staff || "").split('\n').map(n => n.trim()).filter(n => n);
                    oss.forEach(os => { if (staffStats[os]) { staffStats[os].other++; staffStats[os].total++; } });
                });

                // เรียงลำดับ (Main > Other)
                const sortedDoctors = Object.entries(doctorStats).sort((a, b) => (b[1].main - a[1].main) || (b[1].other - a[1].other));
                const sortedStaffs = Object.entries(staffStats).sort((a, b) => (b[1].main - a[1].main) || (b[1].other - a[1].other));

                // วาดตารางแพทย์
                let docHtml = '';
                let tMr = 0, tOr = 0, tAllD = 0;
                sortedDoctors.forEach(([name, stat]) => {
                    tMr += stat.main; tOr += stat.other; tAllD += stat.total;
                    docHtml += `
                        <tr>
                            <td class="text-start ps-3">
                                <div class="fw-bold">${name}</div>
                                <div class="group-text">${stat.group || '-'}</div>
                            </td>
                            <td><span class="badge ${stat.main > 0 ? 'bg-primary' : 'bg-secondary opacity-50'} badge-count">${stat.main}</span></td>
                            <td><span class="badge ${stat.other > 0 ? 'bg-info text-dark' : 'bg-secondary opacity-50'} badge-count">${stat.other}</span></td>
                            <td class="bg-light fw-bold">${stat.total}</td>
                        </tr>`;
                });
                docHtml += `<tr class="table-primary fw-bold"><td class="text-end pe-3">รวม</td><td>${tMr}</td><td>${tOr}</td><td>${tAllD}</td></tr>`;
                document.getElementById('doctor-tbody').innerHTML = docHtml;

                // วาดตารางอาจารย์
                let staffHtml = '';
                let tMs = 0, tOs = 0, tAllS = 0;
                sortedStaffs.forEach(([name, stat]) => {
                    tMs += stat.main; tOs += stat.other; tAllS += stat.total;
                    staffHtml += `
                        <tr>
                            <td class="text-start ps-3">
                                <div class="fw-bold">${name}</div>
                                <div class="group-text">${stat.group || '-'}</div>
                            </td>
                            <td><span class="badge ${stat.main > 0 ? 'bg-success' : 'bg-secondary opacity-50'} badge-count">${stat.main}</span></td>
                            <td><span class="badge ${stat.other > 0 ? 'bg-warning text-dark' : 'bg-secondary opacity-50'} badge-count">${stat.other}</span></td>
                            <td class="bg-light fw-bold">${stat.total}</td>
                        </tr>`;
                });
                staffHtml += `<tr class="table-success fw-bold"><td class="text-end pe-3">รวม</td><td>${tMs}</td><td>${tOs}</td><td>${tAllS}</td></tr>`;
                document.getElementById('staff-tbody').innerHTML = staffHtml;

                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('summary-content').style.display = 'block';

            }).catch(e => {
                document.getElementById('loading-spinner').innerHTML = `<div class="text-danger py-5">Error: ${e.message}</div>`;
            });
    }
</script>
</body>
</html>
